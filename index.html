.pair-code-slot{width:48px;height:62px;border-radius:10px;background:rgba(255,255,255,0.05);border:1.5px solid var(--bd-2);color:var(--t);font-size:28px;font-weight:600;text-align:center;font-family:inherit;outline:none;letter-spacing:0}
.pair-code-slot:focus{border-color:var(--g);background:var(--g-lt)}
.pair-code-slot.filled{border-color:var(--g-dk)}
.pair-code-slot.error{border-color:var(--err);background:rgba(220,38,38,0.08)}

.pair-qr-frame{width:220px;height:220px;margin:20px auto;position:relative;border-radius:18px;background:#000;padding:8px}
.pair-qr-frame::before,.pair-qr-frame::after{content:"";position:absolute;width:36px;height:36px;border-color:var(--g);border-style:solid}
.pair-qr-frame::before{top:-3px;left:-3px;border-width:4px 0 0 4px;border-top-left-radius:16px}
.pair-qr-frame::after{bottom:-3px;right:-3px;border-width:0 4px 4px 0;border-bottom-right-radius:16px}
.pair-qr-inner{width:100%;height:100%;background:#020617;border-radius:10px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.pair-qr-line{position:absolute;left:5%;right:5%;height:2px;background:var(--g);animation:scan 1.8s ease-in-out infinite;box-shadow:0 0 14px var(--g)}

.pair-device-info{background:var(--g-lt);border:0.5px solid var(--g-bd);border-radius:12px;padding:14px 16px;margin-bottom:16px}
.pair-device-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
.pair-device-row:not(:last-child){border-bottom:0.5px solid var(--g-bd)}
.pair-device-k{color:var(--t-3);font-size:12px}
.pair-device-v{color:var(--t);font-weight:500;font-family:monospace}

.pair-detecting{display:flex;gap:10px;align-items:center;padding:14px;background:rgba(59,130,246,0.08);border:0.5px solid rgba(59,130,246,0.25);border-radius:10px;margin-bottom:16px;font-size:12px;color:var(--info-t)}
.pair-detecting svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;animation:spin 1.5s linear infinite;flex-shrink:0}

.pair-success-ic{width:88px;height:88px;border-radius:50%;background:var(--ok);display:flex;align-items:center;justify-content:center;margin:30px auto 24px;animation:pop .4s ease-out}
.pair-success-ic svg{width:48px;height:48px;stroke:#fff;stroke-width:3.5;fill:none;stroke-linecap:round;stroke-linejoin:round}

.pair-back{background:none;border:none;color:var(--t-3);font-size:13px;font-family:inherit;cursor:pointer;padding:8px 0;display:flex;align-items:center;gap:6px;margin-bottom:12px}
.pair-back:hover{color:var(--t)}
.pair-back svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

.pair-help{text-align:center;font-size:12px;color:var(--t-4);margin-top:12px}
.pair-help a{color:var(--g);text-decoration:none;cursor:pointer}

.pair-assign-row{padding:14px 16px;background:rgba(255,255,255,0.04);border-radius:10px;margin-bottom:6px;cursor:pointer;border:0.5px solid transparent;transition:all .15s}
.pair-assign-row:hover{background:rgba(255,255,255,0.07);border-color:var(--bd)}
.pair-assign-row.selected{background:var(--g-lt);border-color:var(--g-bd)}
.pair-assign-row-head{display:flex;justify-content:space-between;align-items:center;gap:10px}
.pair-assign-name{font-size:14px;font-weight:500;color:var(--t)}
.pair-assign-meta{font-size:11px;color:var(--t-3);margin-top:2px}
.pair-assign-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--bd-2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.pair-assign-row.selected .pair-assign-check{background:var(--g);border-color:var(--g)}
.pair-assign-row.selected .pair-assign-check svg{width:12px;height:12px;stroke:#0d1a05;stroke-width:3;fill:none}

.pair-perm-row{padding:14px;border-radius:12px;background:rgba(255,255,255,0.04);border:0.5px solid var(--bd);margin-bottom:8px;display:flex;gap:12px;align-items:flex-start;transition:all .2s}
.pair-perm-row.granted{border-color:rgba(34,197,94,0.3);background:rgba(34,197,94,0.06)}
.pair-perm-ic{width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,0.06);color:var(--t);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pair-perm-row.granted .pair-perm-ic{background:var(--ok-bg);color:var(--ok-t)}
.pair-perm-ic svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.pair-perm-body{flex:1;min-width:0}
.pair-perm-head{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.pair-perm-ttl{font-size:14px;font-weight:500;color:var(--t)}
.pair-perm-tag{font-size:9px;padding:2px 6px;border-radius:7px;background:rgba(220,38,38,0.15);color:var(--err-t);font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.pair-perm-tag.opt{background:rgba(255,255,255,0.08);color:var(--t-3)}
.pair-perm-sub{font-size:12px;color:var(--t-3);line-height:1.45}
.pair-perm-btn{padding:8px 14px;border-radius:9px;background:var(--g);color:#0d1a05;border:none;font-weight:500;font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0;align-self:center;white-space:nowrap}
.pair-perm-btn:hover{opacity:.88}
.pair-perm-btn.done{background:rgba(34,197,94,0.15);color:var(--ok-t);cursor:default}
.pair-perm-btn.done:hover{opacity:1}


/* ============ LOCK OVERLAY ============ */
.lock-overlay{position:absolute;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column;padding:60px 28px 28px;align-items:center}
.lock-overlay.shown{display:flex}
.lock-ic{width:76px;height:76px;border-radius:50%;background:rgba(220,38,38,0.12);display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.lock-ic svg{width:36px;height:36px;stroke:var(--err-t);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.lock-h{font-size:24px;font-weight:600;color:var(--t);margin-bottom:6px;letter-spacing:-0.01em}
.lock-s{font-size:13px;color:var(--t-3);margin-bottom:28px;text-align:center}
.pin-dots{display:flex;gap:14px;margin-bottom:16px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--bd-2);transition:all .2s}
.pin-dot.filled{background:var(--g);border-color:var(--g);transform:scale(1.05)}
.pin-err{color:var(--err-t);font-size:12px;margin-bottom:14px;min-height:16px}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:280px}
.key{padding:18px;border-radius:14px;background:rgba(255,255,255,0.05);color:var(--t);border:none;font-size:22px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .1s}
.key:hover{background:rgba(255,255,255,0.1)}
.key:active{transform:scale(0.96);background:rgba(255,255,255,0.15)}
.key.empty{background:transparent;cursor:default}
.key.empty:hover{background:transparent}
.key.del{font-size:18px}

/* Modal */
.modal-scrim{position:absolute;inset:0;background:rgba(0,0,0,0.6);z-index:50;display:none;align-items:flex-end;justify-content:center}
.modal-scrim.shown{display:flex;animation:fade .2s}
@keyframes fade{from{opacity:0}}
.modal{width:100%;background:var(--bg-3);border-radius:20px 20px 0 0;padding:20px;max-height:75%;overflow-y:auto;animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}}
.modal-handle{width:36px;height:4px;background:var(--bd-2);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:18px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--t-3);margin-bottom:16px}

.empty{text-align:center;padding:48px 20px;color:var(--t-3)}
.empty-ic{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.empty-ic svg{width:28px;height:28px;stroke:var(--t-3);stroke-width:2;fill:none}

.live-dot{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--ok-t)}
.live-dot::before{content:"";width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 1.5s infinite}

/* ── C-01: Global focus-visible ring ──────────────────────── */
*:focus-visible{outline:2px solid var(--g);outline-offset:3px}
*:focus:not(:focus-visible){outline:none}

/* ── C-02: Scan simulate buttons min 44px ─────────────────── */
.scan-view [onclick*="setScan"]{min-height:44px;padding:12px 6px}

/* ── M-03: Eliminate 300ms tap delay globally ─────────────── */
button,a,[onclick]{touch-action:manipulation}

/* ── H-01: Ensure QR scanner line animates ─────────────────── */
.scan-view.s-idle .vf-line{animation:scan 1.8s ease-in-out infinite}

/* ── H-06: Nav items — consistent interactive states ─────── */
.nav-item:focus-visible{outline:2px solid var(--g);outline-offset:2px;border-radius:8px}
.nav-item:active{opacity:.7;transform:scale(0.95)}

/* ── H-05: Wristband action buttons focus ─────────────────── */
.wb-stn-action:focus-visible{outline:2px solid var(--g);outline-offset:3px}
.wb-stn-action:active{opacity:.8;transform:scale(0.99)}

/* ── M-05: Scan result views — tap to reset cursor ──────────  */
.scan-view:not(.s-idle){cursor:pointer}

/* ── H-02: prefers-reduced-motion ──────────────────────────── */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
  .vf-line{animation:none}
  .login-spinner{animation:none;border:3px solid var(--g);border-top-color:transparent}
  .wb-writing-anim{animation:none}
}
</style>
</head>

          color:var(--g);border:0.5px solid var(--g-bd);white-space:nowrap"></span>

<script>
/* ========== CONFIG ========== */

const PERMISSIONS = {
  scanner_only:    ['scan'],
  wristband_only:  ['attach_wristband'],
};

const ROLE_META = {
  scanner_only:   { label: "Scanner · Location A", ctx: 'A' },
  wristband_only: { label: "Wristband Station · Entrance", ctx: 'W' },
};

/* ========== RENDERING ========== */

function getNav() {
  return state.role === 'vendor_scanner' ? VENDOR_NAV : NAV_CONFIG;
}

function permsForRole() {
  return PERMISSIONS[state.role] || [];
}

function canSeeTab(tab) {
  if (tab.perms.includes('*')) return true;
  const perms = permsForRole();
  return tab.perms.some(p => perms.includes(p));
}

function wbPendingCount() {
  // Pending is always event-wide — guests choose which station to visit
  return state.wbPendingTotal;
}

function tabEnabled(tab) {
  if (tab.needsNet && state.network === 'offline') return false;
  return true;
}

function render() {
  renderTopbar();
  renderBanner();
  renderContent();
  renderNav();
  renderLock();
  renderLogin();
  renderEventPicker();
  renderSquare();
  renderOnboarding();
  renderDrill();
}

function renderTopbar() {
  const meta = ROLE_META[state.role] || { ctx: '?', label: 'Unknown role' };
  const user = state.currentUser;
  const prod = state.session.production;
  const evt  = state.session.event;
  const loc  = state.session.location;

  // Logo mark is static in HTML — no need to update ctx-icon

  // Title — user name + show info
  const showLabel = prod
    ? (evt ? prod.name + ' · ' + evt.time : prod.name)
    : (state.role === 'wristband_only' ? 'Wristband Station' : 'Select a show');
  document.getElementById('ctx-title').textContent = user ? user.name : meta.label;
  document.getElementById('ctx-sub').textContent   = user ? showLabel : 'Not signed in';

  // Location pill — show when location is set
  const locPill = document.getElementById('loc-pill');
  if (locPill) {
    if (loc && user) {
      locPill.textContent = '📍 ' + loc.name;
      locPill.style.display = 'inline-flex';
    } else {
      locPill.style.display = 'none';
    }
  }

  const pill = document.getElementById('conn-pill');
  const text = document.getElementById('conn-text');
  pill.classList.remove('ok', 'off', 'sync');
  if (state.network === 'offline') {
    pill.classList.add('off');
    text.textContent = state.queuedScans > 0 ? `Offline · ${state.queuedScans} queued` : 'Offline';
  } else if (state.network === 'syncing') {
    pill.classList.add('sync');
    text.textContent = 'Syncing';
  } else {
    pill.classList.add('ok');
    text.textContent = 'Synced';
  }
}

function renderBanner() {
  const slot = document.getElementById('banner-slot');
  let html = '';
  if (state.onCall) {
    html = `<div class="banner call"><span>Supervisor call · 0:42</span><span style="font-size:11px">Tap to return</span></div>`;
  } else if (state.network === 'offline') {
    html = `<div class="banner warn">${ICONS.offline}<span>Scan works offline. Sell and Dashboard need connection.</span></div>`;
  } else if (state.network === 'syncing') {
    html = `<div class="banner info">${ICONS.sync}<span>Uploading queued scans…</span></div>`;
  }
  slot.innerHTML = html;
}

function renderContent() {
  const c = document.getElementById('content');

  const nav = getNav();
  const currentTab = nav.find(t => t.id === state.activeTab);
  if (!currentTab || !canSeeTab(currentTab)) {
    state.activeTab = nav[0].id;
  }

  switch (state.activeTab) {
    case 'scan': return c.innerHTML = renderScanTab();
    case 'lookup': return c.innerHTML = renderLookupTab();
    case 'wristband': return c.innerHTML = renderWristbandTab();
    case 'sell': return c.innerHTML = renderSellTab();
    case 'dash': return c.innerHTML = renderDashTab();
    case 'menu': return c.innerHTML = renderMenuTab();
    case 'redeem': return c.innerHTML = renderRedeemTab();
    case 'history': return c.innerHTML = renderHistoryTab();
  }
}

          <button onclick="setScan('duplicate')"   style="padding:9px 6px;border-radius:10px;border:0.5px solid rgba(245,158,11,0.4);background:rgba(245,158,11,0.12);color:#fed7aa;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">⚠ Duplicate</button>
          <button onclick="setScan('wrong_show')"  style="padding:9px 6px;border-radius:10px;border:0.5px solid rgba(220,38,38,0.4);background:rgba(220,38,38,0.12);color:#fca5a5;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">✕ Wrong event</button>
          <button onclick="setScan('canceled')"    style="padding:9px 6px;border-radius:10px;border:0.5px solid rgba(220,38,38,0.4);background:rgba(220,38,38,0.12);color:#fca5a5;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">✕ Canceled</button>
        </div>
      </div>
    </div>
  ` : `
    <button onclick="setScan('idle')" style="position:absolute;bottom:90px;left:50%;transform:translateX(-50%);padding:12px 28px;border-radius:999px;border:0.5px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.5);color:rgba(255,255,255,0.9);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;backdrop-filter:blur(8px);min-height:44px;touch-action:manipulation">
      Scan next ticket
    </button>
  `;

  // Gate wristband pairing — inline flow after a valid scan
  const gw = state.gateWristband;
  if (gw.step) {
    const nfcIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M7 12h10"/></svg>';

    if (gw.step === 'scanning') return `
      <div class="scan-view s-idle" style="position:relative">
        ${contextBar}
        <div style="background:rgba(45,184,156,.08);border:0.5px solid var(--g-bd);border-radius:12px;
                    padding:10px 14px;margin-bottom:24px;text-align:left;max-width:300px;width:100%">
          <div style="font-size:10px;color:var(--g);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:3px">Checked in</div>
          <div style="font-size:15px;font-weight:600;color:var(--t)">${gw.guestName}</div>
          <div style="font-size:11px;color:var(--t-3);margin-top:2px;font-family:monospace">${gw.ticketCode}</div>
        </div>
        <div class="vf"><div class="vf-line"></div></div>
        <div class="head-md">Scan wristband QR</div>
        <div class="sub" style="margin-bottom:24px">Point camera at the QR on the wristband</div>
        <button onclick="gateWristbandScan('WB-${Math.random().toString(36).slice(2,8).toUpperCase()}')"
          style="padding:12px 28px;border-radius:12px;background:var(--p-dim);border:1px solid var(--p-border);
                 color:var(--p);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:10px">
          Simulate wristband QR ✓
        </button>
        <button onclick="gateSimulateError('nfc_write_error')"
          style="padding:12px 28px;border-radius:12px;background:var(--err-bg);border:0.5px solid var(--red-border);
                 color:var(--err-t);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:10px">
          Simulate: NFC write error
        </button>
        <button onclick="cancelGateWristband()"
          style="padding:10px 20px;border-radius:10px;background:rgba(255,255,255,.06);
                 border:0.5px solid var(--bd);color:var(--t-3);font-size:12px;cursor:pointer;font-family:inherit">
          Skip — next guest
        </button>
      </div>`;

    if (gw.step === 'saving') return `
      <div class="scan-view s-idle" style="position:relative">
        ${contextBar}
        <div style="animation:spin 1s linear infinite;width:48px;height:48px;border-radius:50%;
                    border:3px solid var(--p-dim);border-top-color:var(--p);margin-bottom:20px"></div>
        <div class="head-md">Pairing wristband…</div>
        <div class="sub">Saving to database</div>
      </div>`;

    if (gw.step === 'done') return `
      <div class="scan-view s-valid" style="position:relative">
        ${contextBar}
        <div class="result-icon">${ICONS.check}</div>
        <div class="head-lg">WRISTBAND PAIRED</div>
        <div class="sub">${gw.guestName} is all set</div>
        <div class="info-card">
          <div class="info-card-name">${gw.guestName}</div>
          <div class="info-card-sub" style="font-family:monospace">${gw.wristbandQR}</div>
        </div>
        <div class="chip">Ticket + wristband linked ✓</div>
        <button onclick="cancelGateWristband()" style="margin-top:20px;padding:11px 28px;border-radius:12px;
          background:rgba(0,0,0,0.25);border:1.5px solid rgba(255,255,255,0.3);
          color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">
          Next guest
        </button>
      </div>`;

    if (gw.step === 'already_paired') return `
      <div class="scan-view s-dup" style="position:relative">
        ${contextBar}
        <div class="result-icon">${ICONS.alert}</div>
        <div class="head-lg">ALREADY PAIRED</div>
        <div class="sub">This ticket already has a wristband linked</div>
        <div class="info-card">
          <div class="info-card-name">${gw.guestName}</div>
          <div class="info-card-sub">Wristband was assigned earlier</div>
        </div>
        <button onclick="cancelGateWristband()" style="margin-top:20px;padding:11px 28px;border-radius:12px;
          background:rgba(0,0,0,0.25);border:1.5px solid rgba(255,255,255,0.3);
          color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">
          Next guest
        </button>
      </div>`;

    if (gw.step === 'error') return `
      <div class="scan-view s-invalid" style="position:relative">
        ${contextBar}
        <div class="result-icon">${ICONS.x}</div>
        <div class="head-lg">PAIRING FAILED</div>
        <div class="sub">${gw.errorMsg || 'Could not save. Try again.'}</div>
        <button onclick="state.gateWristband.step='scanning';render()"
          style="margin-top:20px;padding:11px 28px;border-radius:12px;
                 background:rgba(0,0,0,0.25);border:1.5px solid rgba(255,255,255,0.3);
                 color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">
          Try again
        </button>
        <button onclick="cancelGateWristband()" style="margin-top:8px;padding:10px 20px;border-radius:10px;
          background:transparent;border:none;color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;font-family:inherit">
          Skip — next guest
        </button>
      </div>`;
  }

  // No location set — block scanning with an error overlay
  if (!loc && state.signedIn) {
    return `
      <div class="scan-view s-idle" style="position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:28px 24px 90px">
        <div style="width:56px;height:56px;border-radius:50%;background:var(--warn-bg);border:1.5px solid var(--warn-border);display:flex;align-items:center;justify-content:center;margin-bottom:18px">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--warn-t)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16v.01"/></svg>
        </div>
        <div style="font-size:17px;font-weight:700;color:var(--warn-t);margin-bottom:8px;text-align:center">Location not set</div>
        <div style="font-size:13px;color:var(--t-2);text-align:center;line-height:1.6;max-width:260px;margin-bottom:28px">
          You must select your gate or location before you can start scanning tickets.
        </div>
        <button onclick="goTab('menu');openLocationPicker()" style="padding:13px 32px;border-radius:12px;background:var(--warn-bg);border:1.5px solid var(--warn-border);color:var(--warn-t);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Set Location
        </button>
      </div>
    `;
  }

  // M-05: tap anywhere on a result view to reset (except idle which has simulate panel)
  const tapReset = state.scanResult !== 'idle'
    ? `onclick="setScan('idle')" title="Tap to scan next ticket"`
    : '';

  return `
    <div class="scan-view ${r.cls}" style="position:relative" ${tapReset}>
      ${contextBar}
      ${r.body}
      ${simulatePanel}
    </div>
  `;
}

const WB_ERRORS = {
  not_checked_in: {
    icon: '<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16v.01"/></svg>',

    icon: '<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M9 12l2 2 4-4"/></svg>',
    color: 'var(--blue)', bg: 'var(--blue-dim)', border: 'var(--blue-border)',

    color: 'var(--red)', bg: 'var(--err-bg)', border: 'var(--red-border)',
    title: 'Wrong event',
    body: 'This ticket is for a different event and cannot receive a wristband here.',
    action: 'Ask guest to verify their ticket',
  },
  nfc_write_error: {
    icon: '<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"><path d="M5 9.5a12 12 0 0 1 14 0M8 13a7 7 0 0 1 8 0M11 16.5a2.5 2.5 0 0 1 2 0"/><line x1="2" y1="2" x2="22" y2="22"/></svg>',
    color: 'var(--red)', bg: 'var(--err-bg)', border: 'var(--red-border)',
    title: 'Wristband write failed',
    body: 'Could not write to the wristband. It may be defective or already programmed. Try a new blank wristband.',
    action: 'Try a different wristband',
  },
};

function renderWristbandTab() {
  const s = state.wbStation;
  const nfcIc = ICONS.nfc;

  // H-04: step progress indicator
  const STEPS = ['Identify', 'Pair', 'Done'];
  const stepIdx = { idle:-1, identifying:0, scanning_wristband:1, saving:1, tapping:1, done:2, error:-1 }[s.step] ?? -1;
  const stepProgress = stepIdx >= 0 ? `
    <div style="display:flex;align-items:center;gap:6px;justify-content:center;margin-bottom:18px">
      ${STEPS.map((label,i) => `
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:8px;height:8px;border-radius:50%;background:${i<=stepIdx?'var(--g)':'var(--t-5)'};transition:background .2s"></div>
          <span style="font-size:10px;color:${i===stepIdx?'var(--g)':i<stepIdx?'var(--t-3)':'var(--t-5)'};font-weight:${i===stepIdx?'600':'400'}">${label}</span>
          ${i<STEPS.length-1?`<div style="width:20px;height:1px;background:${i<stepIdx?'var(--g-bd)':'var(--t-5)'}"></div>`:''}
        </div>`).join('')}
    </div>` : '';

  // H-05: context bar (show + location) on wristband tab too
  const wbLoc  = state.session.location;
  const wbProd = state.session.production;
  const wbEvt  = state.session.event;
  const wbContextBar = (wbProd || wbLoc) ? `
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:14px">
      ${wbProd&&wbEvt?`<span style="font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;background:rgba(0,0,0,.55);border:0.5px solid rgba(255,255,255,.12);color:rgba(255,255,255,.85)">${wbProd.name} · ${wbEvt.time}</span>`:''}
      ${wbLoc?`<span style="font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;background:rgba(32,153,145,.2);border:0.5px solid rgba(32,153,145,.4);color:#86efac">📍 ${wbLoc.name}</span>`:''}
    </div>` : '';

// ── IDLE: clean home screen ────────────────────────────────────────────────
  if (s.step === 'idle') {
    return `
      <div class="page">
        ${wbContextBar}
        <div class="wb-stn-hero" style="margin-bottom:28px">
          <div class="wb-stn-hero-ic">${nfcIc}</div>
          <div class="wb-stn-hero-h">Wristband Station</div>
          <div class="wb-stn-hero-s">Pair a wristband to a guest's check-in ticket</div>
        </div>

        <div class="sect">Identify the guest</div>

        <button class="wb-stn-action" onclick="wbStationStart('qr')">
          <div class="wb-stn-action-ic">${ICONS.scan}</div>
          <div class="wb-stn-action-body">
            <div class="wb-stn-action-h">Scan check-in ticket (QR)</div>
            <div class="wb-stn-action-s">Guest shows their phone or printed ticket</div>
          </div>
          <span class="wb-stn-action-arr">›</span>
        </button>

        <button class="wb-stn-action" style="margin-top:10px" onclick="wbStationStart('search')">
          <div class="wb-stn-action-ic">${ICONS.search}</div>
          <div class="wb-stn-action-body">
            <div class="wb-stn-action-h">Look up by name or order #</div>
            <div class="wb-stn-action-s">Guest doesn't have ticket handy</div>
          </div>
          <span class="wb-stn-action-arr">›</span>
        </button>
      </div>
    `;
  }

  // ── IDENTIFYING ─────────────────────────────────────────────────────────────
  if (s.step === 'identifying') {
    if (s.method === 'qr') {
      return `
        <div class="page" style="padding:0">
          <div class="wb-stn-scanview">
            ${stepProgress}
            ${wbContextBar}
            <button class="wb-stn-back" onclick="wbStationReset()">‹ Back</button>
            <div class="vf" style="margin:40px auto 20px"><div class="vf-line"></div></div>
            <div class="head-md" style="color:var(--t);text-align:center">Scan check-in ticket</div>
            <div class="sub" style="color:var(--t-3);text-align:center;margin-bottom:28px">Point camera at the ticket's QR code</div>
            <!-- Simulate valid scan — fresh ticket ID each render so DB never conflicts -->
            <button class="btn" style="max-width:260px;margin:0 auto 10px" onclick="wbStationGuestFound('Sofia Mendez', '3-day pass · VIP tier', 'TKT-${Date.now().toString(36).toUpperCase()}', null)">
              Simulate valid QR scan
            </button>
            <!-- Simulate error: already paired -->
            <button class="btn" style="max-width:260px;margin:0 auto 10px;background:var(--blue-dim);color:var(--blue);border:0.5px solid var(--blue-border)" onclick="wbStationGuestFound('Marcus Rivera', '3-day pass · Adult', 'TKT-4713-B', 'already_paired')">
              Simulate: already has wristband
            </button>
            <!-- Simulate error: wrong event -->
            <button class="btn" style="max-width:260px;margin:0 auto;background:var(--err-bg);color:var(--err-t);border:0.5px solid var(--red-border)" onclick="wbStationGuestFound('Guest', 'Other event ticket', 'TKT-XXXX', 'wrong_event')">
              Simulate: wrong event ticket
            </button>
          </div>
        </div>
      `;
    } else {
      // Guest list — REAL tickets from the shared DB (loaded into state.wbGuests).
      if (state.wbGuests == null && !state.wbGuestsLoading) { loadWbGuests(state.wbGuestQuery || ''); }
      const guests = state.wbGuests || [];
      // ticket status → wristband-flow state: 'used' = already checked in (ready to pair),
      // 'valid' = not checked in yet, 'void' = refunded/canceled.
      const statusToError = (st) => st === 'valid' ? 'not_checked_in' : (st === 'void' ? 'wrong_event' : null);
      const ini = (nm) => String(nm || '?').split(' ').slice(0, 2).map(w => w[0] || '').join('').toUpperCase();
      const q = (s) => String(s == null ? '' : s).replace(/'/g, "\\'");
      const rows = guests.length ? guests.map(g => {
        const errType = statusToError(g.status);
        const tag = errType === 'not_checked_in'
          ? `<span class="status-pill" style="margin-left:auto;background:rgba(100,116,139,0.15);color:var(--t-3)">Not in yet</span>`
          : errType === 'wrong_event'
          ? `<span class="status-pill" style="margin-left:auto;background:var(--err-bg);color:var(--err-t)">Void</span>`
          : `<span class="status-pill sp-in" style="margin-left:auto">Checked in</span>`;
        return `
          <div class="wb-stn-guest-row" onclick="wbStationGuestFound('${q(g.name)}', '${q(g.pass)}', '${q(g.ticket_code)}', ${errType ? `'${errType}'` : 'null'})">
            <div class="wb-stn-guest-avatar">${ini(g.name)}</div>
            <div class="wb-stn-guest-body">
              <div class="wb-stn-guest-name">${g.name}</div>
              <div class="wb-stn-guest-meta">${g.pass}${g.order ? ' · ' + g.order : ''}</div>
            </div>
            ${tag}
          </div>`;
      }).join('') : `<div style="padding:18px;text-align:center;color:var(--t-3);font-size:13px">${(state.wbGuests == null || state.wbGuestsLoading) ? 'Loading guests…' : 'No guests found'}</div>`;
      return `
        <div class="page">
          <button class="wb-stn-back" onclick="wbStationReset()">‹ Back</button>
          <div class="sect" style="margin-top:12px">Find a guest</div>
          <input class="input" placeholder="Name, email, order #…" value="${(state.wbGuestQuery || '').replace(/"/g, '&quot;')}" onchange="wbStationSearch(this.value)" autofocus />

          <div class="sect" style="margin-top:14px">Guests</div>
          ${rows}
        </div>
      `;
    }
  }

  // ── ERROR: validation failed ───────────────────────────────────────────────
  if (s.step === 'error') {
    const err = WB_ERRORS[s.errorType] || WB_ERRORS.nfc_write_error;
    return `
      <div class="page">
        <div style="
          margin-top:24px;
          background:${err.bg};border:0.5px solid ${err.border};
          border-radius:18px;padding:28px 24px;
          display:flex;flex-direction:column;align-items:center;text-align:center;gap:14px;
        ">
          <div style="width:52px;height:52px;border-radius:50%;background:${err.bg};border:1.5px solid ${err.border};display:flex;align-items:center;justify-content:center;color:${err.color}">
            ${err.icon}
          </div>
          <div>
            <div style="font-size:17px;font-weight:700;color:${err.color};margin-bottom:6px">${err.title}</div>
            <div style="font-size:13px;color:var(--t-2);line-height:1.6">${err.body}</div>
          </div>
          ${s.guest ? `
            <div style="background:rgba(255,255,255,0.04);border:0.5px solid var(--bd);border-radius:10px;padding:10px 14px;width:100%;text-align:left">
              <div style="font-size:11px;color:var(--t-3);margin-bottom:4px">Ticket scanned</div>
              <div style="font-size:14px;font-weight:600;color:var(--t)">${s.guest.name}</div>
              <div style="font-size:11px;color:var(--t-3);margin-top:2px">${s.guest.pass} · ${s.guest.ticketId}</div>
            </div>
          ` : ''}
          <div style="font-size:12px;color:${err.color};font-weight:500;opacity:.85">${err.action}</div>
        </div>

        <button class="btn" onclick="wbStationReset()" style="margin-top:20px">
          Scan another ticket
        </button>
      </div>
    `;
  }

  // ── SCANNING WRISTBAND QR ─────────────────────────────────────────────────
  if (s.step === 'scanning_wristband') {

function wbStationStart(method) {
  state.wbStation = { step: 'identifying', method, guest: null, uid: null };
  render();
}

// Load real guests (tickets joined to orders) for the wristband search.
function loadWbGuests(q) {
  state.wbGuestQuery = q || '';
  state.wbGuestsLoading = true;
  const eventId = (state.session && state.session.event && state.session.event.id) || '';
  const url = DB_URL + '/api/scan/guests?'
    + (eventId ? 'event_id=' + encodeURIComponent(eventId) + '&' : '')
    + 'q=' + encodeURIComponent(q || '');
  fetch(url)
    .then(r => r.json())
    .then(list => { state.wbGuests = Array.isArray(list) ? list : []; state.wbGuestsLoading = false; render(); })
    .catch(() => { state.wbGuests = []; state.wbGuestsLoading = false; render(); });
}

function wbStationSearch(q) {
  state.wbGuests = null;       // force reload with the new query
  state.wbGuestsLoading = false;
  loadWbGuests(q);
}

function wbStationGuestFound(name, pass, ticketId, errorType) {
  state.wbStation.guest = { name, pass, ticketId };
  if (errorType) {
    state.wbStation.step = 'error';
    state.wbStation.errorType = errorType;
  } else {
    state.wbStation.step = 'scanning_wristband';
    state.wbStation.errorType = null;
  }
  render();
}

function wbStationScanWristbandQR(qrCode) {
  state.wbStation.wristbandQR = qrCode;
  state.wbStation.step = 'saving';
  render();

  const user = state.currentUser;
  fetch(DB_URL + '/api/scan/wristband', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      ticket_code:   state.wbStation.guest.ticketId,
      wristband_qr:  qrCode,
      paired_by:     user ? user.id : null,
      guest_name:    state.wbStation.guest.name,
    }),
  })
    .then(r => r.json().then(data => ({ ok: r.ok, data })))
    .then(({ ok, data }) => {
      if (!ok) {
        state.wbStation.step = 'error';
        state.wbStation.errorType = data.error === 'wristband_already_used' ? 'nfc_write_error' : (data.error || 'nfc_write_error');
        render(); return;
      }
      state.wbStation.step = 'done';
      state.wbStation.pairedAt = data.paired_at;
      if (state.wbPendingTotal > 0) state.wbPendingTotal--;
      render();
    })
    .catch(() => {
      state.wbStation.step = 'error';
      state.wbStation.errorType = 'nfc_write_error';
      render();
    });
}

function wbStationReset() {
  state.wbStation = { step: 'idle', method: null, guest: null, uid: null, wristbandQR: null, errorType: null };
  render();
}

function setWbScope(scope) {
  state.wbScope = scope;
  render();
}

function setSellCategory(cat) {
  state.sell.category = cat;
  render();

function updateCart(itemId, delta) {
  const cart = state.sell.cart;
  const current = cart[itemId] || 0;
  const next = Math.max(0, current + delta);
  if (next === 0) {
    delete cart[itemId];
  } else {
    cart[itemId] = next;
  }
  render();
}

  // Simulate scanning a guest wristband to attribute the sale

  state.sell.attributedTo = null;
  render();

function openSquarePayment() {
  // Compute total in cents
  const totalCents = Math.round(
    Object.entries(state.sell.cart).reduce((sum, [id, qty]) => {
      for (const catItems of Object.values(SELL_CATALOG)) {
        const item = catItems.find(i => i.id === id);
        if (item) return sum + item.price * qty;
      }
      return sum;
    }, 0) * 100
  );

  state.square = {
    open: true,
    step: 'method_select',
    method: null,
    amountCents: totalCents,
    attributedTo: state.sell.attributedTo,
    declineReason: null,
    receiptChoice: null,
    paymentId: null,
    cashTendered: 0,
  };
  render();
}

function closeSquare() {
  state.square.open = false;
  render();

function selectPaymentMethod(method) {
  state.square.method = method;
  if (method === 'tap_iphone') {
    state.square.step = 'tap_ready';
  } else if (method === 'terminal') {
    state.square.step = 'terminal_handoff';
  } else if (method === 'cash') {
    state.square.step = 'cash_tender';
  }
  render();
}

function simulateTapProcessing() {
  state.square.step = 'tap_processing';
  render();
  setTimeout(() => {
    // 85% success rate in simulation
    if (Math.random() < 0.85) {
      state.square.step = 'success';
      state.square.paymentId = 'sqpmt_' + Math.random().toString(36).slice(2, 10);
    } else {
      state.square.step = 'declined';
      state.square.declineReason = ['Card declined by issuer', 'Insufficient funds', 'Card expired'][Math.floor(Math.random() * 3)];
    }
    render();
  }, 2400);
}

function simulateTerminalSuccess() {
  state.square.step = 'success';
  state.square.paymentId = 'sqpmt_' + Math.random().toString(36).slice(2, 10);
  render();
}

function simulateTerminalDecline() {
  state.square.step = 'declined';
  state.square.declineReason = 'Card declined at terminal';
  render();
}

function cashReceived(amount) {
  state.square.cashTendered = amount;
  state.square.step = 'success';
  state.square.paymentId = 'cash_' + Date.now();
  render();
}

function retryPayment() {
  state.square.step = 'method_select';
  state.square.declineReason = null;
  render();
}

function cancelPayment() {
  state.square.step = 'cancelled';
  render();
}

function proceedToReceipt() {
  state.square.step = 'receipt_prompt';
  render();
}

function selectReceipt(choice) {
  state.square.receiptChoice = choice;
  if (choice === 'none') {
    completePayment();
  } else {
    state.square.step = 'sending_receipt';
    render();
    setTimeout(() => completePayment(), 1200);

  state.square.step = 'complete';
  render();
  setTimeout(() => {
    // Clear cart & close
    state.sell.cart = {};
    state.sell.attributedTo = null;
    state.square.open = false;
    render();
  }, 1500);
}

                <div style="font-size:22px;font-weight:700">${amountStr}</div>
                <div style="font-size:10px;color:#60a5fa;margin-top:8px">Waiting for card…</div>
              </div>
            </div>
          </div>
          <div class="sq-tap-amount">${amountStr}</div>
          <div class="sq-tap-h">Customer is paying at the Terminal</div>
          <div class="sq-tap-s">They'll insert, tap, or swipe their card on the countertop device</div>
        </div>

        <div class="sq-powered" style="margin-top:24px">
          <svg width="12" height="12" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16v.01"/></svg>
          <span>Device remains on this screen until Terminal confirms</span>
        </div>
      </div>
      <div class="wb-foot">
        <button class="btn" onclick="simulateTerminalSuccess()">Simulate success</button>
        <div class="btn-row" style="margin-top:8px">
          <button class="btn btn-ghost" onclick="simulateTerminalDecline()">Simulate decline</button>
          <button class="btn btn-ghost" onclick="cancelPayment()">Cancel</button>
        </div>
      </div>
    `;
    return;
  }

  // Step: cash_tender
  if (sq.step === 'cash_tender') {
    const amount = sq.amountCents / 100;
    const quick = [
      amount,
      Math.ceil(amount / 5) * 5,
      Math.ceil(amount / 10) * 10,
      Math.ceil(amount / 20) * 20,
    ].filter((v, i, arr) => arr.indexOf(v) === i).slice(0, 4);

    content.innerHTML = `
      <div class="wb-modal-top">
        <div class="wb-modal-title">Cash tendered</div>
        <button class="wb-modal-close" onclick="closeSquare()">×</button>
      </div>
      <div class="wb-modal-body">
        <div class="sq-amount-card">
          <div class="sq-amount-label">Due</div>
          <div class="sq-amount-v">${amountStr}</div>
        </div>

        <div class="sect" style="margin-top:16px">Customer gave</div>
        <div class="sq-cash-grid">
          ${quick.map(v => `
            <button class="sq-cash-btn" onclick="cashReceived(${v * 100})">
              $${v.toFixed(2)}
              ${v === amount ? '<div class="sq-cash-sub">Exact</div>' : `<div class="sq-cash-sub">Change $${(v - amount).toFixed(2)}</div>`}
            </button>
          `).join('')}
        </div>

        <div style="font-size:11px;color:var(--t-3);text-align:center;margin-top:16px;line-height:1.5">
          Select the amount given by the customer. Any change owed will be shown on the next screen.
        </div>
      </div>
      <div class="wb-foot">
        <button class="btn" style="background:rgba(255,255,255,0.08);color:var(--t);border:0.5px solid var(--bd-2)" onclick="state.square.step='method_select';render()">← Back to payment methods</button>
      </div>
    `;
    return;
  }

  // Step: success
  if (sq.step === 'success') {
    const isCash = sq.method === 'cash';
    const change = isCash ? (sq.cashTendered - sq.amountCents) / 100 : 0;

    content.innerHTML = `
      <div class="wb-modal-top">
        <div class="wb-modal-title">Payment successful</div>
        <div style="width:32px"></div>
      </div>
      <div class="wb-modal-body">
        <div class="sq-success">
          <div class="sq-success-ic">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
          </div>
          <div class="sq-success-amount">${amountStr}</div>
          <div class="sq-success-label">Paid via ${sq.method === 'tap_iphone' ? 'Tap to Pay' : sq.method === 'terminal' ? 'Square Terminal' : 'Cash'}</div>

          ${isCash && change > 0 ? `
            <div class="sq-change-card">
              <div class="sq-change-label">Change due</div>
              <div class="sq-change-v">$${change.toFixed(2)}</div>
              <div class="sq-change-sub">Give back ${change >= 1 ? `$${change.toFixed(2)}` : `${Math.round(change * 100)}¢`} to the customer</div>
            </div>
          ` : ''}

          <div class="wb-pair-summary" style="margin-top:${isCash && change > 0 ? '14px' : '24px'}">
            <div class="wb-pair-summary-row"><span>Amount</span><span>${amountStr}</span></div>
            ${isCash ? `<div class="wb-pair-summary-row"><span>Tendered</span><span>$${(sq.cashTendered / 100).toFixed(2)}</span></div>` : ''}
            <div class="wb-pair-summary-row"><span>Method</span><span>${sq.method === 'tap_iphone' ? 'Tap to Pay on iPhone' : sq.method === 'terminal' ? 'Square Terminal' : 'Cash'}</span></div>
            ${attrName ? `<div class="wb-pair-summary-row"><span>Guest</span><span>${attrName}</span></div>` : ''}
            <div class="wb-pair-summary-row"><span>Payment ID</span><span style="font-family:ui-monospace,monospace;font-size:11px">${sq.paymentId}</span></div>
            <div class="wb-pair-summary-row"><span>At</span><span>${new Date().toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})}</span></div>
          </div>
        </div>
      </div>
      <div class="wb-foot">
        <button class="btn" onclick="proceedToReceipt()">Receipt options</button>
      </div>
    `;
    return;
  }

  // Step: declined
  if (sq.step === 'declined') {
    content.innerHTML = `
      <div class="wb-modal-top">
        <div class="wb-modal-title">Payment declined</div>
        <button class="wb-modal-close" onclick="closeSquare()">×</button>
      </div>
      <div class="wb-modal-body">
        <div class="sq-decline">
          <div class="sq-decline-ic">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6l-12 12"/></svg>
          </div>
          <div class="sq-decline-h">Card was declined</div>
          <div class="sq-decline-reason">${sq.declineReason}</div>
          <div class="sq-decline-s">No charge was made. Ask the customer for a different payment method.</div>
        </div>
      </div>
      <div class="wb-foot">
        <button class="btn" onclick="retryPayment()">Try another method</button>
        <button class="btn" style="margin-top:8px;background:rgba(255,255,255,0.08);color:var(--t);border:0.5px solid var(--bd-2)" onclick="cancelPayment()">Cancel sale</button>
      </div>
    `;
    return;
  }

  // Step: cancelled
  if (sq.step === 'cancelled') {
    content.innerHTML = `
      <div class="wb-modal-top">
        <div class="wb-modal-title">Payment cancelled</div>
        <div style="width:32px"></div>
      </div>
      <div class="wb-modal-body">
        <div class="sq-decline">
          <div class="sq-cancel-ic">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M8 12h8"/></svg>
          </div>
          <div class="sq-decline-h">Sale cancelled</div>
          <div class="sq-decline-s">No charge was made. Cart remains loaded if you want to try again.</div>
        </div>
      </div>
      <div class="wb-foot">
        <button class="btn" onclick="closeSquare()">Back to Sell</button>
      </div>
    `;
    return;
  }

  // Step: receipt_prompt
  if (sq.step === 'receipt_prompt') {
    content.innerHTML = `
      <div class="wb-modal-top">
        <div class="wb-modal-title">Send receipt</div>
        <button class="wb-modal-close" onclick="completePayment()">×</button>
      </div>
      <div class="wb-modal-body">
        <div class="sq-receipt-total">
          <span>Paid</span>
          <strong>${amountStr}</strong>
        </div>

        <div class="sect" style="margin-top:6px">How should we send the receipt?</div>

        <button class="sq-receipt-opt ${attrName ? '' : 'hint'}" onclick="selectReceipt('email')">
          <div class="sq-receipt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg></div>
          <div class="sq-receipt-body">
            <div class="sq-receipt-h">Email</div>
            <div class="sq-receipt-s">${attrName ? `To ${attrName}'s email on file` : 'Enter customer email'}</div>
          </div>
          <span class="sq-method-arr">›</span>
        </button>

        <button class="sq-receipt-opt" onclick="selectReceipt('text')">
          <div class="sq-receipt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8v.5z"/></svg></div>
          <div class="sq-receipt-body">
            <div class="sq-receipt-h">Text message</div>
            <div class="sq-receipt-s">Enter phone number</div>
          </div>
          <span class="sq-method-arr">›</span>
        </button>

        <button class="sq-receipt-opt" onclick="selectReceipt('print')">
          <div class="sq-receipt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></div>
          <div class="sq-receipt-body">
            <div class="sq-receipt-h">Print</div>
            <div class="sq-receipt-s">To paired receipt printer</div>
          </div>
          <span class="sq-method-arr">›</span>
        </button>

        <button class="sq-receipt-opt subtle" onclick="selectReceipt('none')">
          <div class="sq-receipt-body" style="margin-left:0">
            <div class="sq-receipt-h" style="color:var(--t-3)">No receipt</div>
          </div>
        </button>
      </div>
    `;
    return;
  }

  // Step: sending_receipt
  if (sq.step === 'sending_receipt') {
    const label = sq.receiptChoice === 'email' ? 'Sending email…' : sq.receiptChoice === 'text' ? 'Sending text…' : 'Printing…';
    content.innerHTML = `
      <div class="wb-modal-top">
        <div class="wb-modal-title">${label}</div>
        <div style="width:32px"></div>
      </div>
      <div class="wb-modal-body">
        <div class="sq-tap-stage">
          <div class="sq-processing-ring"></div>
          <div class="sq-tap-h" style="margin-top:20px">${label}</div>
        </div>
      </div>
    `;
    return;
  }

  // Step: complete
  if (sq.step === 'complete') {
    content.innerHTML = `
      <div class="wb-modal-top">
        <div class="wb-modal-title">Done</div>
        <div style="width:32px"></div>
      </div>
      <div class="wb-modal-body">
        <div class="sq-success">
          <div class="sq-success-ic" style="animation:badge-pop .3s">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 7"/></svg>
          </div>
          <div class="sq-success-amount">Sale complete</div>
          <div class="sq-success-label">Ready for next customer</div>
        </div>
      </div>
    `;
    return;
  }
}

/* ========== ROLE ONBOARDING ========== */

function openOnboarding() {
  state.onboarding.show = true;
  state.onboarding.stepIndex = 0;
  state.onboarding.practiceState = null;
  render();
}

function closeOnboarding() {
  state.onboarding.show = false;
  state.onboarding.completedForRole = state.role;
  render();
}

function onbNext() {
  const flow = ONBOARDING_FLOWS[state.role] || [];
  if (state.onboarding.stepIndex < flow.length - 1) {
    state.onboarding.stepIndex++;
    state.onboarding.practiceState = null;
    render();
  } else {
    closeOnboarding();
  }
}

function onbPrev() {
  if (state.onboarding.stepIndex > 0) {
    state.onboarding.stepIndex--;
    state.onboarding.practiceState = null;
    render();
  }
}

function onbSkip() {
  // Track in real build: POST /onboarding/skip { role, userId, timestamp }
  state.onboarding.show = false;
  state.onboarding.completedForRole = state.role;
  render();
}

function onbPracticeAddToCart() {
  const s = state.onboarding.practiceState || { count: 0 };
  s.count = (s.count || 0) + 1;
  state.onboarding.practiceState = s;
  render();
}

function onbPracticeReset() {
  state.onboarding.practiceState = { count: 0 };
  render();
}

function renderOnboarding() {
  const overlay = document.getElementById('onb-overlay');
  const shown = state.onboarding && state.onboarding.show;
  overlay.classList.toggle('shown', !!shown);
  if (!shown) return;

  const flow = ONBOARDING_FLOWS[state.role] || [];
  if (flow.length === 0) {
    // No onboarding for this role (shouldn't happen) — close immediately
    closeOnboarding();
    return;
  }

  const idx = state.onboarding.stepIndex;
  const step = flow[idx];
  const total = flow.length;
  const isLast = idx === total - 1;
  const icon = ONBOARDING_ICONS[step.icon] || ONBOARDING_ICONS.scan;
  const content = document.getElementById('onb-content');

  // Build progress dots
  const dots = flow.map((_, i) => `
    <div class="onb-dot ${i === idx ? 'active' : i < idx ? 'done' : ''}"></div>
  `).join('');

  // Practice interaction rendering
  let practiceHtml = '';
  if (step.practice === 'add_to_cart') {
    const count = (state.onboarding.practiceState && state.onboarding.practiceState.count) || 0;
    const targetReached = count >= 2;
    practiceHtml = `
      <div class="onb-practice">
        <div class="onb-practice-item">
          <div class="onb-practice-thumb">🍭</div>
          <div class="onb-practice-body">
            <div class="onb-practice-name">Cotton Candy</div>
            <div class="onb-practice-desc">Pink or blue</div>
          </div>
          <div class="onb-practice-price">$6.00</div>
        </div>
        <div class="onb-practice-stepper">
          <button class="onb-step-btn" onclick="onbPracticeReset()" ${count === 0 ? 'disabled' : ''}>−</button>
          <span class="onb-step-val">${count}</span>
          <button class="onb-step-btn" onclick="onbPracticeAddToCart()">+</button>
        </div>
        ${count > 0 ? `
          <div class="onb-practice-cart ${targetReached ? 'success' : ''}">
            <span>${count} in cart · $${(count * 6).toFixed(2)}</span>
            ${targetReached ? '<span class="onb-practice-check">✓ Nice — you got it</span>' : ''}
          </div>
        ` : ''}
      </div>
    `;
  }

  const canProceed = !step.practice || (state.onboarding.practiceState && state.onboarding.practiceState.count >= 2);

  content.innerHTML = `
    <div class="onb-card">
      <div class="onb-header">
        <div class="onb-dots">${dots}</div>
        <button class="onb-skip" onclick="onbSkip()">Skip</button>
      </div>

      <div class="onb-body">
        <div class="onb-icon-wrap">
          <div class="onb-icon">${icon}</div>
        </div>

        <div class="onb-step-label">Step ${idx + 1} of ${total}</div>
        <h2 class="onb-title">${step.title}</h2>
        <p class="onb-text">${step.body}</p>

        ${step.hint ? `
          <div class="onb-hint">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8v.01"/></svg>
            <span>${step.hint}</span>
          </div>
        ` : ''}

        ${practiceHtml}
      </div>

      <div class="onb-footer">
        ${idx > 0 ? `
          <button class="onb-btn onb-btn-ghost" onclick="onbPrev()">Back</button>
        ` : '<div></div>'}
        <button class="onb-btn onb-btn-primary ${!canProceed ? 'disabled' : ''}" ${!canProceed ? 'disabled' : ''} onclick="onbNext()">
          ${isLast ? (step.practice ? 'Finish' : 'Start my shift') : 'Continue'}
        </button>
      </div>
    </div>
  `;
}

function getTimeRangeLabel() {
  const d = state.dash;
  if (d.timeRange === 'last_hour') return 'Last hour';
  if (d.timeRange === 'last_4h') return 'Last 4 hours';
  if (d.timeRange === 'all_event') return 'Opening through now';
  if (d.timeRange === 'custom') return `${formatDateTimeReadable(d.customStart)} → ${formatDateTimeReadable(d.customEnd)}`;
  return 'Event to date';
}

function formatEventRange() {
  const s = new Date(CURRENT_EVENT.startsAt);
  const e = new Date(CURRENT_EVENT.endsAt);
  const opts = { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' };
  return `${s.toLocaleString('en-US', opts)} – ${e.toLocaleString('en-US', opts)}`;
}

function formatEventRangeShort() {
  const s = new Date(CURRENT_EVENT.startsAt);
  const e = new Date(CURRENT_EVENT.endsAt);
  if (CURRENT_EVENT.isMultiDay) {
    return `${s.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}–${e.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
  }
  return s.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function formatDateTimeReadable(iso) {
  // "2026-04-24T18:00" → "Fri 6:00 PM"
  const d = new Date(iso);
  if (CURRENT_EVENT.isMultiDay) {
    return d.toLocaleString('en-US', { weekday: 'short', hour: 'numeric', minute: '2-digit' });
  }
  return d.toLocaleString('en-US', { hour: 'numeric', minute: '2-digit' });
}

function formatShortCustom() {
  const d = state.dash;
  const s = new Date(d.customStart);
  const e = new Date(d.customEnd);
  if (CURRENT_EVENT.isMultiDay) {
    const sDay = s.toLocaleDateString('en-US', { weekday: 'short' });
    const eDay = e.toLocaleDateString('en-US', { weekday: 'short' });
    const sTime = s.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const eTime = e.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    return sDay === eDay ? `${sDay} ${sTime}–${eTime}` : `${sDay} ${sTime}–${eDay} ${eTime}`;
  }
  const sTime = s.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  const eTime = e.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  return `${sTime}–${eTime}`;
}

function applyPreset(name) {
  // Quick-pick presets relative to the event window
  const start = new Date(CURRENT_EVENT.startsAt);
  const end = new Date(CURRENT_EVENT.endsAt);

  if (name === 'opening_peak') {
    // First 3 hours of the event
    const peakEnd = new Date(start.getTime() + 3 * 60 * 60 * 1000);
    state.dash.customStart = toIsoLocal(start);
    state.dash.customEnd = toIsoLocal(peakEnd);
  } else if (name === 'last_evening') {
    // 6pm to close on the final day
    const lastDay = new Date(end);
    lastDay.setHours(18, 0, 0, 0);
    state.dash.customStart = toIsoLocal(lastDay);
    state.dash.customEnd = toIsoLocal(end);
  } else if (name === 'weekend') {
    // Sat–Sun of event (simplified: find first Sat)
    const sat = new Date(start);
    while (sat.getDay() !== 6 && sat < end) sat.setDate(sat.getDate() + 1);
    const mon = new Date(sat);
    mon.setDate(mon.getDate() + 2);
    mon.setHours(0, 0, 0, 0);
    state.dash.customStart = toIsoLocal(sat < end ? sat : start);
    state.dash.customEnd = toIsoLocal(mon < end ? mon : end);
  }
  render();
}

function toIsoLocal(d) {
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function generateEventDateOptions(selected) {
  const opts = [];
  const s = new Date(CURRENT_EVENT.startsAt);
  const e = new Date(CURRENT_EVENT.endsAt);
  const selectedDate = selected.slice(0, 10);
  const cur = new Date(s.getFullYear(), s.getMonth(), s.getDate());
  const endDay = new Date(e.getFullYear(), e.getMonth(), e.getDate());
  while (cur <= endDay) {
    const val = toIsoLocal(cur).slice(0, 10);
    const label = cur.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    opts.push(`<option value="${val}" ${val === selectedDate ? 'selected' : ''}>${label}</option>`);
    cur.setDate(cur.getDate() + 1);
  }
  return opts.join('');
}

function generateEventTimeOptions(selected, which) {
  // Show 30-min intervals, but clamp to event bounds for the selected date
  const opts = [];
  const selectedTime = selected.slice(11);
  const selectedDate = selected.slice(0, 10);
  const eventStart = CURRENT_EVENT.startsAt;
  const eventEnd = CURRENT_EVENT.endsAt;

  for (let h = 0; h < 24; h++) {
    for (let m = 0; m < 60; m += 30) {
      const hh = String(h).padStart(2, '0');
      const mm = String(m).padStart(2, '0');
      const timeVal = `${hh}:${mm}`;
      const fullIso = `${selectedDate}T${timeVal}`;
      // Clamp: only show times within the event for this date
      if (fullIso < eventStart || fullIso > eventEnd) continue;
      const labelDate = new Date(`${selectedDate}T${timeVal}`);
      const label = labelDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      opts.push(`<option value="${timeVal}" ${timeVal === selectedTime ? 'selected' : ''}>${label}</option>`);
    }
  }
  return opts.join('');
}

/* ========== DASHBOARD REFRESH INDICATOR ========== */

// Auto-refresh cadence varies by time range — live windows update more often
function getRefreshIntervalSec() {
  const r = state.dash.timeRange;
  if (r === 'last_hour') return 30;    // rolling — every 30s
  if (r === 'last_4h') return 60;      // every 60s
  if (r === 'all_event') return 60;    // every 60s
  if (r === 'custom') return 120;      // historical data — slower cadence
  return 60;
}

function formatRefreshAgo(ms) {
  if (!ms) return 'just now';
  const deltaSec = Math.floor((Date.now() - ms) / 1000);
  if (deltaSec < 5) return 'just now';
  if (deltaSec < 60) return `${deltaSec}s ago`;
  const min = Math.floor(deltaSec / 60);
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  return `${hr}h ago`;
}

function formatRefreshTimestamp(ms) {
  if (!ms) return '—';
  return new Date(ms).toLocaleTimeString('en-US', {
    hour: 'numeric',
    minute: '2-digit',
    second: '2-digit',
  });
}

function renderRefreshBar() {
  const d = state.dash;
  const refreshing = d.refreshing;
  const stale = !!d.refreshError;
  const ago = formatRefreshAgo(d.lastFetchedAt);
  const isLiveWindow = d.timeRange === 'last_hour' || d.timeRange === 'last_4h' || d.timeRange === 'all_event';

  let leftHtml, rightHtml, className = 'dash-refresh';

  if (refreshing) {
    className += ' refreshing';
    leftHtml = `
      <div class="dash-refresh-dot pulse"></div>
      <span class="dash-refresh-label">Refreshing…</span>
    `;
    rightHtml = `
      <button class="dash-refresh-btn" disabled>
        <svg class="spin" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.2-8.5"/><path d="M21 3v6h-6"/></svg>
      </button>
    `;
  } else if (stale) {
    className += ' stale';
    leftHtml = `
      <div class="dash-refresh-dot err"></div>
      <span class="dash-refresh-label">Stale · last updated ${ago}</span>
    `;
    rightHtml = `
      <button class="dash-refresh-btn err" onclick="manualRefresh()">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.2-8.5"/><path d="M21 3v6h-6"/></svg>
        <span>Retry</span>
      </button>
    `;
  } else {
    className += ' fresh';
    leftHtml = `
      <div class="dash-refresh-dot live"></div>
      <div class="dash-refresh-text">
        <span class="dash-refresh-label">Data as of ${formatRefreshTimestamp(d.lastFetchedAt)}</span>
        ${isLiveWindow ? `<span class="dash-refresh-sub">Refreshes in ${d.nextRefreshInSec}s</span>` : '<span class="dash-refresh-sub">Static range — tap to refresh</span>'}
      </div>
    `;
    rightHtml = `
      <button class="dash-refresh-btn" onclick="manualRefresh()" aria-label="Refresh now">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.2-8.5"/><path d="M21 3v6h-6"/></svg>
      </button>
    `;
  }

  return `
    <div class="${className}">
      <div class="dash-refresh-left">${leftHtml}</div>
      ${rightHtml}
    </div>
  `;
}

function manualRefresh() {
  if (state.dash.refreshing) return;
  performRefresh();
}

function performRefresh() {
  state.dash.refreshing = true;
  state.dash.refreshError = null;
  render();

  // Simulate an API call with a short delay
  setTimeout(() => {
    // Simulate occasional failure when offline
    if (state.network === 'offline') {
      state.dash.refreshing = false;
      state.dash.refreshError = 'offline';
      render();
      return;
    }
    state.dash.refreshing = false;
    state.dash.refreshError = null;
    state.dash.lastFetchedAt = Date.now();
    state.dash.nextRefreshInSec = getRefreshIntervalSec();
    render();
  }, 900);
}

// Auto-refresh ticker — counts down and triggers refresh when on dashboard tab
let _dashTickerId = null;
function startDashTicker() {
  if (_dashTickerId) return;
  _dashTickerId = setInterval(() => {
    // Only tick when dashboard is visible and not currently refreshing
    if (state.activeTab !== 'dash' || state.dash.refreshing) return;
    // Only auto-refresh on live windows
    const r = state.dash.timeRange;
    if (r !== 'last_hour' && r !== 'last_4h' && r !== 'all_event') return;

    state.dash.nextRefreshInSec -= 1;
    if (state.dash.nextRefreshInSec <= 0) {
      performRefresh();
    } else {
      // Only re-render the refresh bar inline (cheap partial update)
      const bar = document.querySelector('.dash-refresh');
      if (bar) {
        const container = document.createElement('div');
        container.innerHTML = renderRefreshBar();
        bar.replaceWith(container.firstElementChild);
      }
    }
  }, 1000);
}

// Initialize the first fetch when dashboard becomes active
function ensureDashInitialized() {
  if (state.activeTab === 'dash' && !state.dash.lastFetchedAt && !state.dash.refreshing) {
    performRefresh();
  }
}

function renderDrill() {
  const overlay = document.getElementById('drill-overlay');
  const shown = !!state.dash.drill;
  overlay.classList.toggle('shown', shown);
  if (!shown) return;

  const drill = state.dash.drill;
  const content = document.getElementById('drill-content');

  if (drill.type === 'staff') {
    content.innerHTML = renderStaffDrill(drill);
  } else if (drill.type === 'location') {
    content.innerHTML = renderLocationDrill(drill);
  } else if (drill.type === 'fraud') {
    content.innerHTML = renderFraudDrill();
  }
}

function renderActivityRow(a, context) {

  };
  const ic = iconMap[a.type] || iconMap.checkin;
  const metaText = context === 'staff' ? a.location : a.staff;
  const amountHtml = a.amount
    ? `<div class="drill-feed-amount ${a.amount < 0 ? 'neg' : ''}">${a.amount < 0 ? '−' : ''}$${Math.abs(a.amount).toFixed(2)}</div>`
    : '';
  const flagHtml = a.flag ? `<span class="drill-feed-flag">⚠</span>` : '';

  return `
    <div class="drill-feed-row">
      <div class="drill-feed-time">${a.time}</div>

        <div class="drill-feed-meta">${metaText}</div>
      </div>
      ${amountHtml}
    </div>
  `;
}

/* ===== Tenant-scoped session (operators are managed from the Ticket System) ===== */
const SCAN_SESSION_KEY = 'evinra-scan-session';

function saveScanSession() {
  if (!state.currentUser) return;
  const payload = {
    user: state.currentUser,            // { id, name, email, role, appRole, tenantId, tenantName }
    role: state.role,
    activeTab: state.activeTab,
    session: {
      location:   state.session.location,
      production: state.session.production,
      event:      state.session.event,
    },
    ts: Date.now(),
  };
  try {
    const remember = !!state.login.remember;
    (remember ? localStorage : sessionStorage).setItem(SCAN_SESSION_KEY, JSON.stringify(payload));
    (remember ? sessionStorage : localStorage).removeItem(SCAN_SESSION_KEY); // keep a single copy
  } catch (e) {}
}

function clearScanSession() {
  try { localStorage.removeItem(SCAN_SESSION_KEY); sessionStorage.removeItem(SCAN_SESSION_KEY); } catch (e) {}
}

function restoreScanSession() {
  let raw = null, persistent = false;
  try {
    raw = sessionStorage.getItem(SCAN_SESSION_KEY);
    if (!raw) { raw = localStorage.getItem(SCAN_SESSION_KEY); persistent = true; }
  } catch (e) {}
  if (!raw) return false;
  let p; try { p = JSON.parse(raw); } catch (e) { return false; }
  if (!p || !p.user) return false;
  // Discard stale sessions with no tenant (e.g. a pre-tenant or legacy login):
  // every real operator belongs to a company, so force a fresh sign-in instead.
  if (!p.user.tenantId) { clearScanSession(); return false; }
  // "Remember me" sessions persist up to 12h; tab sessions live until the tab closes.
  if (persistent && p.ts && (Date.now() - p.ts) > 12 * 3600 * 1000) { clearScanSession(); return false; }

  state.currentUser = p.user;
  state.role = p.role || p.user.appRole || 'scanner_only';
  state.signedIn = true;
  state.login.remember = persistent;
  state.activeTab = p.activeTab || (state.role === 'wristband_only' ? 'wristband' : 'scan');
  state.session.location   = (p.session && p.session.location)   || null;
  state.session.production = (p.session && p.session.production) || null;
  state.session.event      = (p.session && p.session.event)     || null;
  state.pendingEventSelection = !state.session.event;
  // Load this operator's company catalogue (for the picker / name re-render).
  loadTenantEvents(state.currentUser.tenantId);
  return true;
}

/* Scope the scan catalogue to the operator's company: event → show → production → tenant. */
function loadTenantEvents(tenantId) {
  const base = DB_URL + '/api/db';
  const done = () => { try { renderEventPicker(); } catch (e) {} render(); };
  if (!tenantId) {
    // Account isn't linked to a company. Do NOT show other tenants' events
    // (cross-company isolation) — surface a clear message instead.
    state.dbEvents = [];
    state.eventLoadState = 'no-tenant';
    done();
    return;
  }
  state.eventLoadState = 'loading';
  // An operator scans active shows (published OR on sale) — not just "published".
  // Exclude only non-sellable states; date filtering (today/future) happens in the picker.
  const INACTIVE = { draft: 1, cancelled: 1, canceled: 1, archived: 1, void: 1 };
  Promise.all([
    fetch(base + '/productions?tenant_id=eq.' + encodeURIComponent(tenantId)).then(r => r.json()).catch(() => []),
    fetch(base + '/shows').then(r => r.json()).catch(() => []),
    fetch(base + '/events?order=start_at.asc').then(r => r.json()).catch(() => []),
  ]).then(([prods, shows, events]) => {
    const prodIds = new Set((prods || []).map(p => String(p.id || p._id)));
    const showIds = new Set((shows || []).filter(s => prodIds.has(String(s.production_id))).map(s => String(s.id || s._id)));
    state.dbEvents = (events || []).filter(e =>
      showIds.has(String(e.show_id)) && !INACTIVE[String(e.status || '').toLowerCase()]);
    state.eventLoadState = 'loaded';
    done();
  }).catch(() => { state.eventLoadState = 'error'; done(); });
}

function submitLogin() {
  const l = state.login;
  if (!l.email || !l.password) {
    l.error = 'Enter your email and 4-digit PIN';
    render(); return;
  }
  if (!l.email.includes('@')) {
    l.error = 'Enter a valid email address';
    render(); return;
  }

  l.error = null;
  l.step = 'loading';
  render();

  fetch(DB_URL + '/api/scan/auth', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: l.email.trim().toLowerCase(), pin: l.password.trim() }),
  })
    .then(r => r.json().then(data => ({ ok: r.ok, data })))
    .then(({ ok, data }) => {
      state.login.step = 'form';
      if (!ok) {
        state.login.error = data.error || 'Sign-in failed';
        render(); return;
      }
      // Success — set user + role from DB (tenant comes from the authenticated user)
      state.currentUser = data.user;        // includes tenantId + tenantName
      state.role = data.user.appRole;       // 'scanner_only' | 'wristband_only'
      state.signedIn = true;
      state.activeTab = data.user.appRole === 'wristband_only' ? 'wristband' : 'scan';
      state.pendingEventSelection = true;
      state.eventPickerSelected = null;
      saveScanSession();                    // persist now; event is chosen next
      render();
      // Pre-load THIS company's events for the picker (scoped by tenant).
      state.dbEvents = [];
      loadTenantEvents(data.user.tenantId);
    })
    .catch(() => {
      state.login.step = 'form';
      state.login.error = 'Could not reach the database service (localhost:4000). Make sure evinra-shared-db is running.';
      render();
    });
}

// Real scan: pulls a REAL ticket code from the shared DB matching the chosen
// scenario, then validates it through /api/scan/validate. The displayed result
// (and guest/type/event info) reflects actual DB state — e.g. scanning the same
// ticket twice genuinely returns "duplicate". Falls back to the simulated result
// if :4000 is unreachable (offline MVP behaviour).
async function setScan(scenario) {
  state.activeTab = 'scan';

  if (scenario === 'idle') {
    state.scanResult = 'idle';
    state.lastScan = null;
    render();
    return;
  }

  const eventId = (state.session && state.session.event && state.session.event.id) || '';
  try {
    // 1) get a real ticket code for this scenario
    const sRes = await fetch(DB_URL + '/api/scan/sample?scenario=' + encodeURIComponent(scenario)
      + (eventId ? '&event_id=' + encodeURIComponent(eventId) : ''));
    const sample = await sRes.json();
    const code = sample && sample.ticket_code;
    if (!code) throw new Error('no sample ticket');

    // 2) validate it against the real backend (marks valid tickets as used)
    const vRes = await fetch(DB_URL + '/api/scan/validate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        ticket_code: code,
        event_id: eventId || null,
        scanned_by: state.currentUser ? state.currentUser.id : null,
      }),
    });
    const data = await vRes.json();
    state.scanResult = data.result || scenario;
    state.lastScan   = data.ticket || null;
  } catch (e) {
    // Offline / no data — keep the demo usable with the simulated result.
    state.scanResult = scenario;
    state.lastScan = null;
  }
  render();
}
