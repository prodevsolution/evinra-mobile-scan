<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Evinra Scan App — Interactive Prototype</title>
<!-- Evinra shared DB client (talks to evinra-shared-db on :4000) -->
<script src="evinra-db.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* ── Evinra brand palette — exact colors from official dark-bg logo SVG ──
     #209991  teal (swoosh)   #12615C  dark teal   #263148  navy   #FEFEFE  white  */

  --g:#209991;         --g-dk:#12615C;      --g-navy:#263148;
  --g-lt:rgba(32,153,145,.15);
  --g-bd:rgba(32,153,145,.32);
  --g-glow:rgba(32,153,145,.08);

  /* Surfaces */
  --bg:#080F0E;        --bg-2:#0F1A18;      --bg-3:#162320;
  --bg-card:#111C1A;

  /* Text — off-white from logo */
  --t:#FEFEFE;         --t-2:#B0C4C0;       --t-3:#6E8E8B;
  --t-4:#3D5552;       --t-5:#22302E;

  /* Borders — teal-tinted */
  --bd:rgba(32,153,145,.18);    --bd-2:rgba(32,153,145,.30);

  /* Status */
  --ok:#12615C;        --ok-bg:rgba(32,153,145,.14);    --ok-t:#4DC9BF;
  --warn:#b45309;      --warn-bg:rgba(224,163,97,.12);   --warn-t:#E0A361;
  --warn-border:rgba(224,163,97,.30);
  --err:#b91c1c;       --err-bg:rgba(224,99,99,.10);     --err-t:#E08080;
  --red:#E06363;       --red-border:rgba(224,99,99,.28);
  --info:#1e3a8a;      --info-bg:rgba(107,163,224,.10);  --info-t:#6BA3E0;
  --blue:#6BA3E0;      --blue-dim:rgba(107,163,224,.12); --blue-border:rgba(107,163,224,.28);
  --vip:#9C82E0;

  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}

body{font-family:var(--sans);background:#081510;color:var(--t);line-height:1.4;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center;gap:20px}

/* ============ CONTROL PANEL ============ */

/* ============ DEVICE FRAME ============ */
.device{width:390px;max-width:100%;background:#000;border-radius:42px;padding:8px;border:0.5px solid var(--bd);box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.screen{background:var(--bg);border-radius:36px;overflow:hidden;height:780px;display:flex;flex-direction:column;position:relative}

/* Status bar */
.statusbar{display:flex;justify-content:space-between;align-items:center;padding:12px 28px 6px;font-size:13px;color:var(--t);font-weight:600;flex-shrink:0}
.statusbar .right{display:flex;gap:5px;align-items:center}
.statusbar .signal,.statusbar .wifi,.statusbar .battery{display:inline-block;width:14px;height:10px}
.statusbar .signal svg,.statusbar .wifi svg,.statusbar .battery svg{width:100%;height:100%;stroke:currentColor;fill:currentColor}

/* Banner */
.banner{padding:8px 16px;font-size:12px;font-weight:500;display:flex;gap:8px;align-items:center;flex-shrink:0}
.banner svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.banner.warn{background:var(--warn-bg);color:var(--warn-t);border-bottom:0.5px solid rgba(245,158,11,0.3)}
.banner.info{background:var(--info-bg);color:var(--info-t);border-bottom:0.5px solid rgba(59,130,246,0.3)}
.banner.info svg{animation:spin 1.6s linear infinite}
.banner.danger{background:var(--err-bg);color:var(--err-t);border-bottom:0.5px solid rgba(220,38,38,0.3)}
.banner.call{background:var(--ok);color:#fff;justify-content:space-between}
.banner.call::before{content:"";width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 1.2s infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{50%{opacity:.4}}

/* Top context bar */
.topbar{padding:12px 16px 14px;background:rgba(255,255,255,0.03);border-bottom:0.5px solid var(--bd-2);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-shrink:0}
.topbar-ctx{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
.ctx-icon{width:38px;height:38px;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;padding:4px}
.ctx-icon svg{width:100%;height:auto;display:block}
.ctx-text{min-width:0;flex:1}
.ctx-title{font-size:14px;font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctx-sub{font-size:11px;color:#4DC9BF;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
/* #4DC9BF = 4.6:1 on #080F0E — passes WCAG AA */
.conn-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:500;flex-shrink:0;white-space:nowrap}
.conn-pill.ok{background:#064e3b;color:var(--ok-t)}
.conn-pill.off{background:#7c2d12;color:var(--warn-t)}
.conn-pill.sync{background:#1e40af;color:var(--info-t)}
.conn-pill .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.conn-pill.off .dot,.conn-pill.sync .dot{animation:pulse 1.5s infinite}

/* ============ CONTENT AREA ============ */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative}
.content::-webkit-scrollbar{width:0}

/* Scan state — full-screen color */
.scan-view{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px 90px;transition:background .25s;overflow-y:auto}
.scan-view::-webkit-scrollbar{width:0}
.scan-view.s-idle{background:var(--bg)}
.scan-view.s-valid{background:var(--ok)}
.scan-view.s-dup{background:var(--warn)}
.scan-view.s-invalid{background:var(--err)}
.scan-view.s-info{background:var(--info)}
.scan-view.s-vip{background:var(--vip)}

.vf{width:220px;height:220px;border:2px solid rgba(255,255,255,0.3);border-radius:20px;position:relative;margin-bottom:28px}
.vf::before,.vf::after{content:"";position:absolute;width:32px;height:32px;border-color:var(--g);border-style:solid}
.vf::before{top:-2px;left:-2px;border-width:4px 0 0 4px;border-top-left-radius:18px}
.vf::after{bottom:-2px;right:-2px;border-width:0 4px 4px 0;border-bottom-right-radius:18px}
.vf-line{position:absolute;left:8%;right:8%;height:2px;background:var(--g);top:50%;animation:scan 1.8s ease-in-out infinite;box-shadow:0 0 12px var(--g)}
/* H-01 fix: ensure animation runs */
@keyframes scan{0%,100%{top:10%}50%{top:88%}}

.result-icon{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px;background:rgba(255,255,255,0.18);animation:pop .3s ease-out}
.result-icon svg{width:52px;height:52px;stroke:#fff;stroke-width:3.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
@keyframes pop{0%{transform:scale(0.6);opacity:0}100%{transform:scale(1);opacity:1}}

.head-lg{font-size:38px;font-weight:700;color:#fff;letter-spacing:-0.02em;margin-bottom:8px;line-height:1.05}
.head-md{font-size:26px;font-weight:600;color:#fff;letter-spacing:-0.01em;margin-bottom:6px}
.sub{font-size:15px;color:rgba(255,255,255,0.92);max-width:280px;line-height:1.45;margin-bottom:16px}

.info-card{background:rgba(0,0,0,0.3);border-radius:14px;padding:12px 16px;min-width:240px;margin-top:8px;text-align:left}
.info-card-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:2px}
.info-card-sub{font-size:12px;color:rgba(255,255,255,0.75)}
.chip{display:inline-block;padding:6px 14px;border-radius:16px;background:rgba(0,0,0,0.3);color:#fff;font-size:12px;font-weight:500;margin-top:10px}
.chip.cta{background:#fff;color:#0d1a05;cursor:pointer}

.scan-actions{position:absolute;bottom:20px;left:0;right:0;display:flex;gap:10px;justify-content:center;padding:0 20px;z-index:2}
.scan-btn{flex:1;max-width:140px;padding:11px;border-radius:12px;background:rgba(0,0,0,0.35);color:#fff;border:0.5px solid rgba(255,255,255,0.2);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.scan-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.scan-btn.torch-on{background:#fff;color:#0d1a05;border-color:#fff}

/* Scan mode selector (QR vs NFC) */

/* NFC reader animation (idle state) */
.nfc-reader{width:140px;height:140px;border-radius:50%;background:rgba(175,189,119,0.1);border:2px solid rgba(175,189,119,0.25);display:flex;align-items:center;justify-content:center;margin-bottom:22px;position:relative}
.nfc-reader::before,.nfc-reader::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid var(--g);animation:nfc-pulse 2s ease-out infinite}
.nfc-reader::after{animation-delay:1s}
.nfc-reader svg{width:56px;height:56px;stroke:var(--g);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;z-index:1}
@keyframes nfc-pulse{0%{transform:scale(1);opacity:0.6}100%{transform:scale(1.5);opacity:0}}

/* Wristband info card variants */
.wrist-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;background:rgba(255,255,255,0.18);font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px}
.wrist-badge svg{width:12px;height:12px;stroke:currentColor;stroke-width:2.5;fill:none}

.balance-meter{margin-top:10px;padding:10px 14px;background:rgba(0,0,0,0.22);border-radius:10px;text-align:left}
.balance-meter-label{font-size:11px;color:rgba(255,255,255,0.7);margin-bottom:4px}
.balance-meter-amount{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.01em}
.balance-bar{height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin-top:8px;overflow:hidden}
.balance-bar-fill{height:100%;background:#fff;border-radius:2px;transition:width .4s}

/* Subtle optional attach link on VALID screen — for one-stop checkpoints only */
.inline-attach-link{margin-top:18px;padding:10px 14px;background:rgba(0,0,0,0.25);border:0.5px solid rgba(255,255,255,0.22);border-radius:10px;display:inline-flex;align-items:center;gap:8px;cursor:pointer;color:rgba(255,255,255,0.9);font-size:12px;font-weight:500;transition:all .15s;font-family:inherit}
.inline-attach-link:hover{background:rgba(0,0,0,0.4);border-color:rgba(255,255,255,0.45);color:#fff}
.inline-attach-link svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* Wristband pair modal */
.wb-modal{position:absolute;inset:0;background:rgba(2,6,23,0.92);backdrop-filter:blur(12px);z-index:88;display:none;flex-direction:column;padding:0}
.wb-modal.shown{display:flex}
.wb-modal > div{flex:1;display:flex;flex-direction:column;min-height:0}
.wb-modal-top{padding:20px 24px 8px;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.wb-modal-close{background:rgba(255,255,255,0.08);border:none;width:32px;height:32px;border-radius:50%;color:var(--t);cursor:pointer;font-family:inherit;font-size:16px;display:flex;align-items:center;justify-content:center}
.wb-modal-title{font-size:13px;font-weight:600;color:var(--t);letter-spacing:.04em;text-transform:uppercase}
.wb-modal-body{flex:1;overflow-y:auto;padding:8px 24px 20px;display:flex;flex-direction:column}
.wb-modal-body::-webkit-scrollbar{width:0}

.wb-uid-card{background:rgba(175,189,119,0.08);border:0.5px solid var(--g-bd);border-radius:14px;padding:16px;margin-bottom:18px;display:flex;gap:12px;align-items:center}
.wb-uid-ic{width:48px;height:48px;border-radius:14px;background:var(--g-lt);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--g)}
.wb-uid-ic svg{width:24px;height:24px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.wb-uid-label{font-size:11px;color:var(--t-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.wb-uid-val{font-size:15px;font-weight:600;color:var(--t);font-family:ui-monospace,SFMono-Regular,monospace;letter-spacing:.02em}
.wb-uid-sub{font-size:11px;color:var(--t-3);margin-top:2px}

.wb-search-input{width:100%;background:rgba(255,255,255,0.06);border:0.5px solid var(--bd-2);border-radius:12px;padding:12px 16px;font-size:14px;color:var(--t);font-family:inherit;outline:none;margin-bottom:12px}
.wb-search-input:focus{border-color:var(--g)}

.wb-ticket-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,0.04);border:0.5px solid var(--bd);border-radius:12px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.wb-ticket-row:hover{border-color:var(--g-bd);background:rgba(175,189,119,0.05)}
.wb-ticket-avatar{width:36px;height:36px;border-radius:10px;background:rgba(175,189,119,0.2);color:var(--g);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0}
.wb-ticket-body{flex:1;min-width:0}
.wb-ticket-name{font-size:14px;font-weight:500;color:var(--t)}
.wb-ticket-meta{font-size:11px;color:var(--t-3);margin-top:2px}
.wb-ticket-arr{color:var(--t-3);font-size:18px}

.wb-writing{display:flex;flex-direction:column;align-items:center;text-align:center;padding:30px 0;flex:1;justify-content:center}
.wb-writing-anim{width:120px;height:120px;border-radius:50%;background:rgba(175,189,119,0.1);border:2px solid rgba(175,189,119,0.25);display:flex;align-items:center;justify-content:center;margin-bottom:24px;position:relative}
.wb-writing-anim::before{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid var(--g);animation:nfc-pulse 1.5s ease-out infinite}
.wb-writing-anim svg{width:48px;height:48px;stroke:var(--g);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.wb-writing-h{font-size:20px;font-weight:600;color:var(--t);margin-bottom:6px}
.wb-writing-s{font-size:13px;color:var(--t-3);line-height:1.5;max-width:260px}

.wb-done{display:flex;flex-direction:column;align-items:center;text-align:center;padding:20px 0;flex:1;justify-content:center}
.wb-done-ic{width:76px;height:76px;border-radius:50%;background:var(--ok-bg);color:var(--ok-t);display:flex;align-items:center;justify-content:center;margin-bottom:20px;border:2px solid rgba(34,197,94,0.4)}
.wb-done-ic svg{width:40px;height:40px;stroke:currentColor;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.wb-done-h{font-size:22px;font-weight:600;color:var(--t);margin-bottom:6px}
.wb-done-s{font-size:13px;color:var(--t-3);margin-bottom:20px;line-height:1.5;max-width:280px}

.wb-pair-summary{background:rgba(34,197,94,0.06);border:0.5px solid rgba(34,197,94,0.25);border-radius:12px;padding:14px;margin-bottom:18px;text-align:left;width:100%;max-width:300px}
.wb-pair-summary-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.wb-pair-summary-row span:first-child{color:var(--t-3)}
.wb-pair-summary-row span:last-child{color:var(--t);font-weight:500}

.wb-foot{padding:14px 24px 22px;border-top:0.5px solid var(--bd);flex-shrink:0;background:rgba(2,6,23,0.98)}

/* Wristband station tab */
.wb-stn-hero{text-align:center;padding:20px 0 24px}
.wb-stn-hero-ic{width:64px;height:64px;border-radius:18px;background:var(--g-lt);border:0.5px solid var(--g-bd);color:var(--g);display:flex;align-items:center;justify-content:center;margin:0 auto 14px}
.wb-stn-hero-ic svg{width:32px;height:32px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.wb-stn-hero-h{font-size:22px;font-weight:600;color:var(--t);letter-spacing:-0.01em;margin-bottom:6px}
.wb-stn-hero-s{font-size:13px;color:var(--t-3);line-height:1.5;max-width:280px;margin:0 auto}

.wb-stn-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.wb-stn-stat{padding:14px;border-radius:12px;background:rgba(255,255,255,0.04);border:0.5px solid var(--bd);text-align:center}
.wb-stn-stat-v{font-size:26px;font-weight:700;color:var(--t);letter-spacing:-0.02em;margin-bottom:2px}
.wb-stn-stat-l{font-size:11px;color:var(--t-3);line-height:1.3}

.wb-stn-action{display:flex;align-items:center;gap:14px;padding:16px;border-radius:14px;background:rgba(175,189,119,0.05);border:0.5px solid var(--g-bd);width:100%;margin-bottom:10px;cursor:pointer;font-family:inherit;text-align:left;transition:all .15s}
.wb-stn-action:hover{background:rgba(175,189,119,0.09);border-color:var(--g)}
.wb-stn-action-ic{width:44px;height:44px;border-radius:12px;background:var(--g-lt);color:var(--g);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wb-stn-action-ic svg{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.wb-stn-action-body{flex:1;min-width:0}
.wb-stn-action-h{font-size:14px;font-weight:600;color:var(--t);margin-bottom:2px}
.wb-stn-action-s{font-size:12px;color:var(--t-3);line-height:1.4}
.wb-stn-action-arr{color:var(--t-3);font-size:20px;flex-shrink:0}

.wb-stn-info{display:flex;gap:10px;padding:14px;background:rgba(59,130,246,0.06);border:0.5px solid rgba(59,130,246,0.2);border-radius:12px;margin-top:20px;font-size:12px;color:var(--info-t);line-height:1.5}
.wb-stn-info svg{stroke:var(--info-t)}

.wb-stn-back{background:none;border:none;color:var(--t-3);font-size:13px;cursor:pointer;font-family:inherit;padding:8px 0;display:inline-flex;align-items:center;gap:4px}
.wb-stn-back:hover{color:var(--t)}

/* Event-wide pending card — single source of truth */
.wb-pending-card{border-radius:14px;padding:16px;margin-bottom:14px;border:0.5px solid var(--bd);background:rgba(255,255,255,0.04);transition:all .3s}
.wb-pending-card.ok{border-color:var(--g-bd);background:rgba(175,189,119,0.05)}
.wb-pending-card.warn{border-color:rgba(245,158,11,0.3);background:rgba(245,158,11,0.05)}
.wb-pending-card.crit{border-color:rgba(220,38,38,0.3);background:rgba(220,38,38,0.05)}
.wb-pending-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:12px}
.wb-pending-label{font-size:13px;font-weight:600;color:var(--t);margin-bottom:2px}
.wb-pending-sub{font-size:11px;color:var(--t-3)}
.wb-pending-num{font-size:38px;font-weight:700;color:var(--t);letter-spacing:-0.03em;line-height:1}
.wb-pending-card.warn .wb-pending-num{color:var(--warn-t)}
.wb-pending-card.crit .wb-pending-num{color:var(--err-t)}
.wb-pending-card.ok .wb-pending-num{color:var(--g)}
.wb-pending-bar{height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-bottom:10px}
.wb-pending-bar-fill{height:100%;background:var(--warn);border-radius:2px;transition:width .4s}
.wb-pending-card.crit .wb-pending-bar-fill{background:var(--err)}
.wb-pending-card.ok .wb-pending-bar-fill{background:var(--g)}
.wb-pending-rate{display:flex;justify-content:space-between;gap:12px;font-size:11px;color:var(--t-3)}
.wb-pending-rate strong{color:var(--t-2);font-weight:600}

/* Scope toggle (supervisor) and station breakdown */
.wb-scope-toggle{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:rgba(255,255,255,0.04);border:0.5px solid var(--bd);border-radius:11px;padding:3px;margin-bottom:14px}
.wb-scope-btn{padding:10px 12px;border-radius:9px;background:transparent;border:none;color:var(--t-3);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.wb-scope-btn:hover{color:var(--t-2)}
.wb-scope-btn.active{background:rgba(175,189,119,0.12);color:var(--g)}
.wb-scope-count{background:rgba(255,255,255,0.1);color:var(--t-2);font-size:11px;font-weight:600;padding:1px 7px;border-radius:8px;min-width:22px;text-align:center}
.wb-scope-btn.active .wb-scope-count{background:var(--g);color:#0d1a05}

.wb-scope-label{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(175,189,119,0.06);border:0.5px solid var(--g-bd);border-radius:999px;margin-bottom:14px;font-size:11px;color:var(--g);font-weight:500}
.wb-scope-label svg{stroke:currentColor;width:12px;height:12px;fill:none;stroke-linecap:round;stroke-linejoin:round}

.wb-station-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,0.03);border:0.5px solid var(--bd);border-radius:11px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.wb-station-row:hover{border-color:var(--g-bd);background:rgba(175,189,119,0.04)}
.wb-station-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.wb-station-body{flex:1;min-width:0}
.wb-station-name{font-size:13px;font-weight:500;color:var(--t)}
.wb-station-meta{font-size:11px;color:var(--t-3);margin-top:2px}
.wb-station-count{min-width:28px;height:24px;padding:0 8px;border-radius:8px;background:rgba(255,255,255,0.08);color:var(--t-2);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.wb-station-count.warn{background:rgba(245,158,11,0.18);color:var(--warn-t)}
.wb-station-count.crit{background:rgba(220,38,38,0.2);color:var(--err-t)}

.wb-reassign-banner{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;background:rgba(245,158,11,0.08);border:0.5px solid rgba(245,158,11,0.28);border-radius:11px;margin-top:10px;font-size:12px;color:var(--warn-t);line-height:1.4}
.wb-reassign-btn{padding:6px 12px;border-radius:8px;background:var(--warn);color:#3d2200;border:none;font-weight:600;font-size:11px;cursor:pointer;font-family:inherit;flex-shrink:0;align-self:center;white-space:nowrap}
.wb-reassign-btn:hover{opacity:.88}

/* Staff reassignment modal */
.rs-target-card{background:rgba(220,38,38,0.08);border:0.5px solid rgba(220,38,38,0.28);border-radius:14px;padding:14px;margin-bottom:18px}
.rs-target-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:10px}
.rs-target-name{font-size:16px;font-weight:600;color:var(--t)}
.rs-target-meta{font-size:11px;color:var(--t-3);margin-top:2px}
.rs-target-pending{background:var(--err);color:#fff;font-size:20px;font-weight:700;padding:6px 12px;border-radius:10px;min-width:52px;text-align:center;letter-spacing:-0.02em}
.rs-target-trend{display:flex;gap:12px;font-size:11px;color:var(--t-3);padding-top:8px;border-top:0.5px solid rgba(220,38,38,0.2)}
.rs-target-trend span strong{color:var(--t-2);font-weight:600}

.rs-group-label{font-size:11px;color:var(--t-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin:14px 0 8px;display:flex;align-items:center;gap:6px}
.rs-group-label-dot{width:7px;height:7px;border-radius:50%}

.rs-staff-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,0.04);border:0.5px solid var(--bd);border-radius:11px;margin-bottom:6px;cursor:pointer;transition:all .15s;width:100%;font-family:inherit;text-align:left}
.rs-staff-row:hover{border-color:var(--g-bd);background:rgba(175,189,119,0.05)}
.rs-staff-row.available{border-color:rgba(34,197,94,0.2)}
.rs-staff-row.available:hover{border-color:rgba(34,197,94,0.5)}
.rs-staff-avatar{width:40px;height:40px;border-radius:50%;background:rgba(175,189,119,0.2);color:var(--g);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;flex-shrink:0;position:relative}
.rs-staff-avatar::after{content:'';position:absolute;bottom:-1px;right:-1px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg-2)}
.rs-staff-row.available .rs-staff-avatar::after{background:#22c55e}
.rs-staff-row.movable .rs-staff-avatar::after{background:#f59e0b}
.rs-staff-row.supervisor .rs-staff-avatar::after{background:#3b82f6}
.rs-staff-body{flex:1;min-width:0}
.rs-staff-name{font-size:14px;font-weight:500;color:var(--t);display:flex;align-items:center;gap:6px}
.rs-staff-status{font-size:10px;padding:1px 6px;border-radius:5px;background:rgba(255,255,255,0.08);color:var(--t-3);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.rs-staff-status.on-break{background:rgba(34,197,94,0.15);color:var(--ok-t)}
.rs-staff-status.roaming{background:rgba(59,130,246,0.15);color:var(--info-t)}
.rs-staff-status.busy{background:rgba(245,158,11,0.15);color:var(--warn-t)}
.rs-staff-meta{font-size:11px;color:var(--t-3);margin-top:2px;display:flex;align-items:center;gap:6px}
.rs-staff-meta svg{width:10px;height:10px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.rs-staff-arr{color:var(--t-3);font-size:20px;flex-shrink:0}

/* Multi-select checkbox on each staff row */
.rs-staff-checkbox{width:22px;height:22px;border-radius:7px;border:1.5px solid var(--bd-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:rgba(255,255,255,0.03)}
.rs-staff-checkbox.checked{background:var(--g);border-color:var(--g)}
.rs-staff-checkbox svg{width:12px;height:12px;stroke:#0d1a05;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.rs-staff-row.selected{border-color:var(--g);background:rgba(175,189,119,0.08)}
.rs-staff-row.selected.available{border-color:var(--g)}
.rs-staff-row.selected:hover{background:rgba(175,189,119,0.12)}

/* Selection summary bar above the Continue button */
.rs-selection-summary{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(175,189,119,0.08);border:0.5px solid var(--g-bd);border-radius:10px;margin-bottom:10px;font-size:12px;color:var(--t-2)}
.rs-selection-summary strong{color:var(--g);font-weight:700;font-size:14px}
.rs-clear-btn{background:none;border:none;color:var(--t-3);font-size:11px;cursor:pointer;font-family:inherit;text-decoration:underline;padding:2px 4px}
.rs-clear-btn:hover{color:var(--t)}

@keyframes fade-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Square payment flow */
.sq-amount-card{background:rgba(175,189,119,0.08);border:0.5px solid var(--g-bd);border-radius:14px;padding:18px;text-align:center}
.sq-amount-label{font-size:11px;color:var(--t-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:6px}
.sq-amount-v{font-size:40px;font-weight:700;color:var(--t);letter-spacing:-0.03em;line-height:1}
.sq-amount-attr{font-size:11px;color:var(--g);margin-top:8px;font-weight:500}

.sq-method{width:100%;display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,255,255,0.03);border:0.5px solid var(--bd);border-radius:12px;margin-bottom:8px;cursor:pointer;font-family:inherit;text-align:left;transition:all .15s}
.sq-method:hover{border-color:var(--g-bd);background:rgba(175,189,119,0.04)}
.sq-method-ic{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sq-method-ic svg{width:22px;height:22px}
.sq-method-ic-tap{background:rgba(59,130,246,0.15);color:#60a5fa}
.sq-method-ic-term{background:rgba(175,189,119,0.15);color:var(--g)}
.sq-method-ic-cash{background:rgba(34,197,94,0.15);color:#4ade80}
.sq-method-body{flex:1;min-width:0}
.sq-method-h{font-size:14px;font-weight:600;color:var(--t);margin-bottom:2px}
.sq-method-s{font-size:11px;color:var(--t-3);line-height:1.4}
.sq-method-arr{color:var(--t-3);font-size:20px;flex-shrink:0}

.sq-powered{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:20px;padding:10px;font-size:10px;color:var(--t-4);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.sq-powered svg{color:var(--t-4)}

/* Tap to Pay stage */
.sq-tap-stage{display:flex;flex-direction:column;align-items:center;text-align:center;padding:20px 0}
.sq-tap-anim{position:relative;width:140px;height:140px;display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.sq-tap-phone{font-size:64px;z-index:2;position:relative;filter:drop-shadow(0 4px 12px rgba(59,130,246,0.4))}
.sq-tap-waves{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.sq-tap-wave{position:absolute;border:2px solid rgba(59,130,246,0.5);border-radius:50%;animation:sq-wave 2s ease-out infinite}
.sq-tap-wave:nth-child(1){width:80px;height:80px;animation-delay:0s}
.sq-tap-wave:nth-child(2){width:80px;height:80px;animation-delay:0.6s}
.sq-tap-wave:nth-child(3){width:80px;height:80px;animation-delay:1.2s}
@keyframes sq-wave{0%{transform:scale(1);opacity:0.8}100%{transform:scale(2.2);opacity:0}}
.sq-tap-amount{font-size:32px;font-weight:700;color:var(--t);letter-spacing:-0.03em;margin-bottom:8px}
.sq-tap-h{font-size:16px;font-weight:600;color:var(--t);margin-bottom:6px;max-width:300px;line-height:1.3}
.sq-tap-s{font-size:12px;color:var(--t-3);max-width:300px;line-height:1.5}

/* Processing */
.sq-processing-ring{width:80px;height:80px;border-radius:50%;border:3px solid rgba(175,189,119,0.15);border-top-color:var(--g);animation:spin 0.9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sq-processing-steps{display:flex;flex-direction:column;gap:8px;margin-top:24px;width:100%;max-width:260px}
.sq-ps-row{padding:10px 14px;background:rgba(255,255,255,0.03);border:0.5px solid var(--bd);border-radius:9px;font-size:12px;color:var(--t-3);text-align:left;display:flex;align-items:center;gap:8px}
.sq-ps-row.done{color:var(--ok-t);border-color:rgba(34,197,94,0.25);background:rgba(34,197,94,0.05)}
.sq-ps-row.active{color:var(--t);border-color:var(--g-bd);background:rgba(175,189,119,0.05)}
.sq-ps-dot{width:8px;height:8px;border-radius:50%;background:var(--g);animation:pulse 1.2s ease-in-out infinite}

/* Terminal mock */
.sq-terminal-anim{margin-bottom:24px;display:flex;align-items:center;justify-content:center}
.sq-terminal-device{width:130px;height:160px;background:#1a1a1a;border-radius:18px;padding:14px;border:2px solid #333;box-shadow:0 8px 24px rgba(0,0,0,0.4);position:relative;animation:sq-terminal-bob 2s ease-in-out infinite}
@keyframes sq-terminal-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.sq-terminal-screen{background:#000;border-radius:8px;padding:14px 10px;height:100%;color:#fff;text-align:center;box-sizing:border-box;display:flex;flex-direction:column;justify-content:center}

/* Cash grid */
.sq-cash-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sq-cash-btn{padding:18px 12px;border-radius:12px;background:rgba(255,255,255,0.04);border:0.5px solid var(--bd);color:var(--t);font-size:18px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:-0.02em;transition:all .15s}
.sq-cash-btn:hover{border-color:var(--g);background:rgba(175,189,119,0.08)}
.sq-cash-sub{font-size:10px;font-weight:500;color:var(--t-3);margin-top:3px;letter-spacing:0}

/* Success */
.sq-success{display:flex;flex-direction:column;align-items:center;text-align:center}
.sq-success-ic{width:72px;height:72px;border-radius:50%;background:rgba(34,197,94,0.15);color:#4ade80;display:flex;align-items:center;justify-content:center;margin-bottom:16px;animation:sq-success-pop .4s ease-out}
.sq-success-ic svg{width:36px;height:36px}
@keyframes sq-success-pop{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.sq-success-amount{font-size:28px;font-weight:700;color:var(--t);letter-spacing:-0.02em;margin-bottom:4px}
.sq-success-label{font-size:12px;color:var(--t-3);margin-bottom:4px}

.sq-change-card{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.35);border-radius:14px;padding:16px;margin-top:14px;text-align:center;width:100%;max-width:340px}
.sq-change-label{font-size:11px;color:var(--warn-t);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:4px}
.sq-change-v{font-size:32px;font-weight:700;color:var(--warn-t);letter-spacing:-0.02em;line-height:1;margin-bottom:6px}
.sq-change-sub{font-size:11px;color:var(--warn-t);opacity:0.85}

/* Decline */
.sq-decline{display:flex;flex-direction:column;align-items:center;text-align:center;padding:12px 0}
.sq-decline-ic{width:72px;height:72px;border-radius:50%;background:rgba(220,38,38,0.15);color:#ef4444;display:flex;align-items:center;justify-content:center;margin-bottom:16px;animation:sq-success-pop .4s ease-out}
.sq-decline-ic svg{width:36px;height:36px}
.sq-cancel-ic{width:72px;height:72px;border-radius:50%;background:rgba(100,116,139,0.15);color:var(--t-3);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.sq-cancel-ic svg{width:36px;height:36px}
.sq-decline-h{font-size:18px;font-weight:600;color:var(--t);margin-bottom:6px}
.sq-decline-reason{font-size:13px;color:var(--err-t);margin-bottom:8px;padding:6px 12px;background:rgba(220,38,38,0.08);border-radius:8px;font-weight:500}
.sq-decline-s{font-size:12px;color:var(--t-3);max-width:280px;line-height:1.5}

/* Receipt prompt */
.sq-receipt-total{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:rgba(175,189,119,0.06);border:0.5px solid var(--g-bd);border-radius:11px;margin-bottom:14px;font-size:13px;color:var(--t-2)}
.sq-receipt-total strong{font-size:18px;font-weight:700;color:var(--g);letter-spacing:-0.01em}
.sq-receipt-opt{width:100%;display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,0.03);border:0.5px solid var(--bd);border-radius:11px;margin-bottom:6px;cursor:pointer;font-family:inherit;text-align:left;transition:all .15s}
.sq-receipt-opt:hover{border-color:var(--g-bd);background:rgba(175,189,119,0.04)}
.sq-receipt-opt.subtle{background:transparent;border-style:dashed;justify-content:center;text-align:center;padding:10px}
.sq-receipt-opt.subtle:hover{background:rgba(255,255,255,0.03);border-style:solid}
.sq-receipt-ic{width:38px;height:38px;border-radius:10px;background:rgba(175,189,119,0.1);color:var(--g);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sq-receipt-ic svg{width:20px;height:20px}
.sq-receipt-body{flex:1;min-width:0}
.sq-receipt-h{font-size:13px;font-weight:500;color:var(--t);margin-bottom:1px}
.sq-receipt-s{font-size:11px;color:var(--t-3);line-height:1.3}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* Role onboarding overlay */
.onb-overlay{position:absolute;inset:0;z-index:95;background:linear-gradient(180deg,rgba(2,6,23,0.92) 0%,rgba(2,6,23,0.98) 100%);backdrop-filter:blur(16px);display:none;padding:20px;animation:onb-fade .25s ease-out}
.onb-overlay.shown{display:flex;align-items:center;justify-content:center}
@keyframes onb-fade{from{opacity:0}to{opacity:1}}

.onb-card{width:100%;max-width:380px;max-height:calc(100vh - 40px);display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(30,41,59,0.8) 0%,rgba(15,23,42,0.95) 100%);border:0.5px solid var(--g-bd);border-radius:22px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,0.6),0 0 0 1px rgba(175,189,119,0.08)}

.onb-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 8px;gap:12px}
.onb-dots{display:flex;gap:5px;flex:1;align-items:center}
.onb-dot{height:4px;flex:1;border-radius:2px;background:rgba(255,255,255,0.1);transition:all .3s}
.onb-dot.done{background:var(--g);opacity:0.45}
.onb-dot.active{background:var(--g);box-shadow:0 0 8px rgba(175,189,119,0.5)}
.onb-skip{background:none;border:none;color:var(--t-3);font-size:12px;cursor:pointer;font-family:inherit;padding:4px 8px;border-radius:6px;font-weight:500;transition:all .15s}
.onb-skip:hover{color:var(--t);background:rgba(255,255,255,0.06)}

.onb-body{padding:12px 24px 20px;display:flex;flex-direction:column;align-items:center;text-align:center;overflow-y:auto;flex:1}

.onb-icon-wrap{margin:16px 0 20px;position:relative}
.onb-icon{width:72px;height:72px;border-radius:22px;background:linear-gradient(135deg,rgba(175,189,119,0.2),rgba(175,189,119,0.06));border:0.5px solid var(--g-bd);display:flex;align-items:center;justify-content:center;color:var(--g);box-shadow:0 8px 24px rgba(175,189,119,0.15);animation:onb-icon-pop .4s ease-out}
.onb-icon svg{width:34px;height:34px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
@keyframes onb-icon-pop{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.08);opacity:1}100%{transform:scale(1)}}

.onb-step-label{font-size:10px;color:var(--g);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:8px}
.onb-title{font-size:22px;font-weight:700;color:var(--t);margin-bottom:10px;letter-spacing:-0.02em;line-height:1.2}
.onb-text{font-size:14px;color:var(--t-2);line-height:1.55;margin-bottom:14px;max-width:320px}

.onb-hint{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(59,130,246,0.08);border:0.5px solid rgba(59,130,246,0.25);border-radius:999px;font-size:11px;color:var(--info-t);font-weight:500;margin-bottom:4px}
.onb-hint svg{width:12px;height:12px;stroke:currentColor;flex-shrink:0}

/* Practice interaction */
.onb-practice{width:100%;margin-top:18px;background:rgba(2,6,23,0.45);border:0.5px dashed var(--g-bd);border-radius:14px;padding:14px}
.onb-practice-item{display:flex;align-items:center;gap:12px;padding:10px;background:rgba(255,255,255,0.04);border-radius:10px;margin-bottom:10px}
.onb-practice-thumb{width:44px;height:44px;border-radius:9px;background:rgba(175,189,119,0.1);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.onb-practice-body{flex:1;min-width:0;text-align:left}
.onb-practice-name{font-size:13px;font-weight:600;color:var(--t)}
.onb-practice-desc{font-size:11px;color:var(--t-3);margin-top:1px}
.onb-practice-price{font-size:14px;font-weight:700;color:var(--g);flex-shrink:0}
.onb-practice-stepper{display:flex;align-items:center;justify-content:center;gap:4px;background:rgba(255,255,255,0.05);border:0.5px solid var(--bd);border-radius:10px;padding:3px;width:fit-content;margin:0 auto}
.onb-step-btn{width:40px;height:36px;border-radius:8px;background:transparent;border:none;color:var(--t);font-size:20px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:all .15s}
.onb-step-btn:hover:not(:disabled){background:rgba(175,189,119,0.1);color:var(--g)}
.onb-step-btn:disabled{color:var(--t-5);cursor:not-allowed}
.onb-step-val{min-width:40px;text-align:center;font-size:16px;font-weight:700;color:var(--t)}
.onb-practice-cart{margin-top:12px;padding:10px 14px;background:rgba(175,189,119,0.08);border:0.5px solid var(--g-bd);border-radius:10px;font-size:12px;color:var(--t-2);display:flex;justify-content:space-between;align-items:center;gap:10px;transition:all .25s}
.onb-practice-cart.success{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.35);animation:onb-cart-success .4s ease-out}
@keyframes onb-cart-success{0%{transform:scale(1)}50%{transform:scale(1.03)}100%{transform:scale(1)}}
.onb-practice-check{color:var(--ok-t);font-weight:600}

.onb-footer{display:flex;gap:10px;padding:16px 18px 18px;border-top:0.5px solid rgba(255,255,255,0.06);align-items:center}
.onb-footer > div{flex:1}
.onb-btn{padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:all .15s;flex:1}
.onb-btn-primary{background:var(--g);color:#0d1a05;box-shadow:0 4px 12px rgba(175,189,119,0.25)}
.onb-btn-primary:hover:not(.disabled){background:#bccb87;box-shadow:0 6px 16px rgba(175,189,119,0.35)}
.onb-btn-primary.disabled,.onb-btn-primary:disabled{opacity:0.35;cursor:not-allowed;box-shadow:none}
.onb-btn-ghost{background:transparent;border:0.5px solid var(--bd-2);color:var(--t-2);flex:0 0 auto;padding:12px 18px}
.onb-btn-ghost:hover{background:rgba(255,255,255,0.05);color:var(--t);border-color:var(--t-3)}

.rs-confirm-card{background:rgba(175,189,119,0.08);border:0.5px solid var(--g-bd);border-radius:14px;padding:16px;margin-bottom:16px}
.rs-confirm-route{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.rs-confirm-node{flex:1;min-width:0}
.rs-confirm-node-label{font-size:10px;color:var(--t-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:4px}
.rs-confirm-node-name{font-size:14px;font-weight:600;color:var(--t)}
.rs-confirm-arrow{color:var(--g);font-size:20px;flex-shrink:0}
.rs-confirm-walk{display:flex;justify-content:space-between;padding-top:10px;border-top:0.5px solid var(--g-bd);font-size:12px;color:var(--t-3)}
.rs-confirm-walk strong{color:var(--t-2);font-weight:600}

.rs-sending{display:flex;flex-direction:column;align-items:center;text-align:center;padding:40px 0}
.rs-sending-ic{width:80px;height:80px;border-radius:50%;background:var(--g-lt);border:2px solid var(--g-bd);display:flex;align-items:center;justify-content:center;margin-bottom:20px;position:relative}
.rs-sending-ic::before{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid var(--g);animation:nfc-pulse 1.5s ease-out infinite}
.rs-sending-ic svg{width:36px;height:36px;stroke:var(--g);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

.rs-done-notify{background:rgba(59,130,246,0.08);border:0.5px solid rgba(59,130,246,0.25);border-radius:11px;padding:12px;margin-top:14px;display:flex;gap:10px;align-items:flex-start;font-size:11px;color:var(--info-t);line-height:1.5}
.rs-done-notify svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;flex-shrink:0;margin-top:2px}

.wb-stn-scanview{padding:20px}

.wb-stn-guest-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,0.04);border:0.5px solid var(--bd);border-radius:12px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.wb-stn-guest-row:hover:not(.disabled){border-color:var(--g-bd);background:rgba(175,189,119,0.05)}
.wb-stn-guest-row.disabled{opacity:0.4;cursor:not-allowed}
.wb-stn-guest-avatar{width:38px;height:38px;border-radius:11px;background:rgba(175,189,119,0.2);color:var(--g);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0}
.wb-stn-guest-body{flex:1;min-width:0}
.wb-stn-guest-name{font-size:14px;font-weight:500;color:var(--t)}
.wb-stn-guest-meta{font-size:11px;color:var(--t-3);margin-top:1px}


/* Standard page */
.page{padding:16px}
.page-title{font-size:22px;font-weight:600;color:var(--t);margin-bottom:4px;letter-spacing:-0.01em}
.page-sub{font-size:13px;color:var(--t-3);margin-bottom:16px}
.sect{font-size:10px;color:var(--t-4);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 8px;font-weight:600}
.sect:first-child{margin-top:0}

/* Inputs */
.input{width:100%;padding:12px 14px;border-radius:10px;background:rgba(255,255,255,0.06);border:0.5px solid var(--bd-2);color:var(--t);font-size:14px;font-family:inherit;margin-bottom:10px;outline:none;transition:border-color .15s}
.input:focus{border-color:var(--g)}
.input::placeholder{color:rgba(255,255,255,0.4)}

/* Pills filter */
.pills{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;overflow-x:auto;padding-bottom:2px}
.pill{font-size:11px;padding:5px 11px;border-radius:14px;background:rgba(255,255,255,0.05);color:var(--t-3);border:0.5px solid var(--bd);cursor:pointer;white-space:nowrap;font-family:inherit}
.pill.active{background:var(--g);color:#0d1a05;border-color:var(--g);font-weight:500}

/* List rows */
.row{padding:12px 14px;border-radius:10px;background:rgba(255,255,255,0.04);border:0.5px solid transparent;margin-bottom:6px;cursor:pointer;transition:all .15s}
.row:hover{background:rgba(255,255,255,0.07);border-color:var(--bd)}
.row-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.row-body{flex:1;min-width:0}
.row-name{font-size:14px;font-weight:500;color:var(--t)}
.row-meta{font-size:11px;color:var(--t-3);margin-top:2px}
.status-pill{font-size:9px;padding:3px 8px;border-radius:9px;font-weight:600;white-space:nowrap;letter-spacing:.02em}
.sp-ok{background:var(--g-lt);color:var(--g)}
.sp-in{background:var(--ok-bg);color:var(--ok-t)}
.sp-out{background:var(--err-bg);color:var(--err-t)}
.sp-warn{background:var(--warn-bg);color:var(--warn-t)}

/* KPIs */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:rgba(255,255,255,0.04);border-radius:10px;padding:12px 14px}
.kpi-lab{font-size:11px;color:var(--t-3)}
.kpi-v{font-size:24px;font-weight:600;color:var(--t);margin-top:2px;letter-spacing:-0.01em}
.kpi-delta{font-size:10px;color:var(--ok-t);margin-top:2px}
.kpi-delta.neg{color:var(--err-t)}

/* Dashboard — time range selector */
.dash-event{display:flex;align-items:center;gap:10px;padding:10px 12px;background:linear-gradient(135deg,rgba(175,189,119,0.08) 0%,rgba(175,189,119,0.02) 100%);border:0.5px solid var(--g-bd);border-radius:12px;margin-bottom:12px}
.dash-event-dot{width:8px;height:8px;border-radius:50%;background:var(--g);flex-shrink:0;box-shadow:0 0 0 3px rgba(175,189,119,0.2);animation:pulse 2s ease-in-out infinite}
.dash-event-body{flex:1;min-width:0}
.dash-event-name{font-size:13px;font-weight:600;color:var(--t);line-height:1.2}
.dash-event-meta{font-size:11px;color:var(--t-3);margin-top:2px}
.dash-time{display:flex;gap:4px;background:rgba(255,255,255,0.04);border:0.5px solid var(--bd);border-radius:10px;padding:3px;margin-bottom:4px;overflow-x:auto}
.dash-time::-webkit-scrollbar{height:0}
.dash-time-btn{padding:7px 12px;border-radius:7px;background:transparent;border:none;color:var(--t-3);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;display:inline-flex;align-items:center;flex-shrink:0}
.dash-time-btn:hover{color:var(--t-2)}
.dash-time-btn.active{background:var(--g);color:#0d1a05;font-weight:600}
.dash-time-btn.active svg{stroke:#0d1a05}

.dash-time-picker{background:rgba(2,6,23,0.55);border:0.5px solid var(--g-bd);border-radius:12px;padding:14px;margin-top:10px;animation:fade-in .2s ease}
.dash-picker-note{display:flex;align-items:center;gap:6px;padding:8px 10px;background:rgba(59,130,246,0.07);border:0.5px solid rgba(59,130,246,0.2);border-radius:8px;font-size:11px;color:var(--info-t);line-height:1.4;margin-bottom:14px}
.dash-picker-note svg{stroke:currentColor;flex-shrink:0}
.dash-picker-row{margin-bottom:12px}
.dash-picker-row:last-of-type{margin-bottom:8px}
.dash-picker-inputs{display:flex;gap:8px;margin-top:5px}
.dash-picker-inputs .dash-time-select{flex:1;min-width:0}
.dash-time-label{font-size:10px;color:var(--t-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;display:block}
.dash-time-select{padding:9px 12px;border-radius:8px;background:rgba(255,255,255,0.06);border:0.5px solid var(--bd-2);color:var(--t);font-size:13px;font-family:inherit;cursor:pointer}
.dash-time-select:focus{outline:none;border-color:var(--g)}

.dash-picker-presets{display:flex;gap:6px;flex-wrap:wrap;padding:10px 0;border-top:0.5px solid var(--bd);margin-top:4px}
.dash-picker-preset{padding:6px 10px;border-radius:7px;background:rgba(175,189,119,0.08);border:0.5px solid var(--g-bd);color:var(--g);font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.dash-picker-preset:hover{background:rgba(175,189,119,0.15)}

.dash-picker-foot{display:flex;gap:8px;padding-top:10px;border-top:0.5px solid var(--bd);margin-top:8px}
.dash-time-apply{flex:1;padding:10px 16px;border-radius:9px;background:var(--g);color:#0d1a05;border:none;font-weight:600;font-size:12px;cursor:pointer;font-family:inherit}
.dash-time-close{flex:0 0 auto;padding:10px 14px;border-radius:9px;background:transparent;border:0.5px solid var(--bd-2);color:var(--t-3);font-size:12px;cursor:pointer;font-family:inherit}
.dash-time-close:hover{color:var(--t);border-color:var(--t-3)}

/* Dashboard — refresh indicator */
.dash-refresh{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 12px;margin-top:10px;background:rgba(255,255,255,0.03);border:0.5px solid var(--bd);border-radius:10px;font-size:11px;transition:all .2s}
.dash-refresh.refreshing{background:rgba(175,189,119,0.05);border-color:var(--g-bd)}
.dash-refresh.stale{background:rgba(245,158,11,0.06);border-color:rgba(245,158,11,0.28)}
.dash-refresh-left{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.dash-refresh-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dash-refresh-dot.live{background:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,0.2);animation:refresh-pulse 2s ease-in-out infinite}
.dash-refresh-dot.pulse{background:var(--g);animation:refresh-pulse-fast 1s ease-in-out infinite}
.dash-refresh-dot.err{background:var(--warn);box-shadow:0 0 0 3px rgba(245,158,11,0.2)}
@keyframes refresh-pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes refresh-pulse-fast{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}
.dash-refresh-text{display:flex;flex-direction:column;gap:2px;min-width:0}
.dash-refresh-label{font-size:11px;font-weight:500;color:var(--t);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-refresh.stale .dash-refresh-label{color:var(--warn-t)}
.dash-refresh.refreshing .dash-refresh-label{color:var(--g)}
.dash-refresh-sub{font-size:10px;color:var(--t-3);line-height:1.2}
.dash-refresh-btn{padding:6px 10px;border-radius:7px;background:transparent;border:0.5px solid var(--bd-2);color:var(--t-3);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;flex-shrink:0;transition:all .15s}
.dash-refresh-btn:hover:not(:disabled){color:var(--t);border-color:var(--g);background:rgba(175,189,119,0.06)}
.dash-refresh-btn:disabled{opacity:0.4;cursor:not-allowed}
.dash-refresh-btn.err{border-color:rgba(245,158,11,0.35);color:var(--warn-t)}
.dash-refresh-btn.err:hover{background:rgba(245,158,11,0.1);border-color:var(--warn)}
.dash-refresh-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-linecap:round;stroke-linejoin:round}
.dash-refresh-btn svg.spin{animation:spin .8s linear infinite}

/* Drill-through overlay — shared across staff/location/fraud */
.drill-overlay{position:absolute;inset:0;z-index:96;background:var(--bg);display:none;flex-direction:column;animation:fade-in .2s ease-out}
.drill-overlay.shown{display:flex}

.drill-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:0.5px solid var(--bd);background:var(--bg-2);flex-shrink:0;gap:12px}
.drill-back{width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,0.06);border:none;color:var(--t);display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit;transition:background .15s}
.drill-back:hover{background:rgba(255,255,255,0.12)}
.drill-back svg{width:16px;height:16px}
.drill-title{font-size:14px;font-weight:600;color:var(--t);text-align:center;flex:1}

.drill-body{flex:1;overflow-y:auto;padding:16px 18px 24px}

/* Drill — chip showing active time range */
.drill-range-chip{display:inline-flex;align-items:center;padding:5px 11px;border-radius:999px;background:rgba(175,189,119,0.08);border:0.5px solid var(--g-bd);font-size:11px;color:var(--g);font-weight:500;margin-bottom:14px;margin-top:12px}

/* Drill — staff hero */
.drill-staff-hero{display:flex;align-items:center;gap:14px;padding:14px;background:rgba(255,255,255,0.03);border:0.5px solid var(--bd);border-radius:14px}
.drill-staff-avatar{width:52px;height:52px;border-radius:50%;background:rgba(175,189,119,0.2);color:var(--g);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;flex-shrink:0}
.drill-staff-info{flex:1;min-width:0}
.drill-staff-name{font-size:17px;font-weight:700;color:var(--t);letter-spacing:-0.01em;line-height:1.1}
.drill-staff-meta{font-size:12px;color:var(--t-3);margin-top:3px}

/* Drill — location hero */
.drill-loc-hero{display:flex;align-items:center;gap:14px;padding:14px;background:rgba(255,255,255,0.03);border:0.5px solid var(--bd);border-radius:14px}
.drill-loc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.drill-loc-info{flex:1;min-width:0}
.drill-loc-name{font-size:16px;font-weight:700;color:var(--t);letter-spacing:-0.01em;line-height:1.1;margin-bottom:6px}
.drill-loc-staff-row{display:flex;gap:4px;flex-wrap:wrap}

/* Drill — fraud hero */
.drill-fraud-hero{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(220,38,38,0.05);border:0.5px solid rgba(220,38,38,0.25);border-radius:14px}
.drill-fraud-ic{width:40px;height:40px;border-radius:10px;background:rgba(220,38,38,0.15);color:#ef4444;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.drill-fraud-ic svg{width:22px;height:22px}
.drill-fraud-info{flex:1;min-width:0}
.drill-fraud-title{font-size:15px;font-weight:700;color:var(--t);letter-spacing:-0.01em}
.drill-fraud-sub{font-size:11px;color:var(--t-3);margin-top:2px;line-height:1.4}

/* Drill — KPI grid */
.drill-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:2px}
.drill-kpi{padding:11px 13px;background:rgba(255,255,255,0.03);border:0.5px solid var(--bd);border-radius:10px}
.drill-kpi-lab{font-size:10px;color:var(--t-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:3px}
.drill-kpi-v{font-size:20px;font-weight:700;color:var(--t);letter-spacing:-0.02em;line-height:1.1}

/* Drill — warning banner for unhealthy location */
.drill-warning{display:flex;gap:10px;padding:12px;background:rgba(245,158,11,0.07);border:0.5px solid rgba(245,158,11,0.28);border-radius:11px;margin-top:12px}
.drill-warning svg{flex-shrink:0;stroke:var(--warn-t);margin-top:2px}

/* Drill — activity feed */
.drill-feed{display:flex;flex-direction:column;gap:4px}
.drill-feed-row{display:flex;align-items:center;gap:10px;padding:9px 11px;background:rgba(255,255,255,0.02);border:0.5px solid var(--bd);border-radius:9px}
.drill-feed-time{font-size:10px;color:var(--t-3);font-family:ui-monospace,monospace;flex-shrink:0;width:56px}
.drill-feed-ic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.drill-feed-ic svg{width:14px;height:14px}
.drill-feed-body{flex:1;min-width:0}
.drill-feed-action{font-size:12px;color:var(--t);line-height:1.3;display:flex;align-items:center;gap:5px}
.drill-feed-meta{font-size:10px;color:var(--t-3);margin-top:2px}
.drill-feed-amount{font-size:13px;font-weight:700;color:var(--g);flex-shrink:0;letter-spacing:-0.01em}
.drill-feed-amount.neg{color:var(--err-t)}
.drill-feed-flag{font-size:10px;color:var(--warn-t)}

/* Drill — fraud list */
.drill-fraud-list{display:flex;flex-direction:column;gap:8px}
.drill-fraud-row{padding:12px;background:rgba(255,255,255,0.03);border:0.5px solid var(--bd);border-radius:11px;border-left:3px solid transparent}
.drill-fraud-row.sev-high{border-left-color:#ef4444;background:rgba(220,38,38,0.04)}
.drill-fraud-row.sev-medium{border-left-color:var(--warn);background:rgba(245,158,11,0.04)}
.drill-fraud-row.sev-low{border-left-color:var(--t-4)}
.drill-fraud-row-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.drill-fraud-sev{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.06em;text-transform:uppercase}
.drill-fraud-sev.sev-high{background:rgba(220,38,38,0.2);color:#fca5a5}
.drill-fraud-sev.sev-medium{background:rgba(245,158,11,0.2);color:var(--warn-t)}
.drill-fraud-sev.sev-low{background:rgba(100,116,139,0.2);color:var(--t-3)}
.drill-fraud-time{font-size:11px;color:var(--t-3);font-family:ui-monospace,monospace}
.drill-fraud-action{font-size:14px;font-weight:600;color:var(--t);margin-bottom:4px;line-height:1.25}
.drill-fraud-detail{font-size:12px;color:var(--t-2);line-height:1.45;margin-bottom:10px}
.drill-fraud-meta{display:flex;flex-wrap:wrap;gap:10px;padding-top:8px;border-top:0.5px solid var(--bd);margin-bottom:10px}
.drill-fraud-meta-item{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--t-3)}
.drill-fraud-meta-item svg{width:11px;height:11px;stroke:currentColor}
.drill-fraud-actions{display:flex;gap:6px}
.drill-fraud-btn{flex:1;padding:7px 10px;border-radius:8px;border:0.5px solid var(--g-bd);background:rgba(175,189,119,0.08);color:var(--g);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.drill-fraud-btn:hover{background:rgba(175,189,119,0.15)}
.drill-fraud-btn.ghost{background:transparent;border-color:var(--bd-2);color:var(--t-3)}
.drill-fraud-btn.ghost:hover{color:var(--t);border-color:var(--t-3);background:rgba(255,255,255,0.04)}

/* Drill — chevron affordance */
.dash-drill-chev{color:var(--t-4);font-size:18px;flex-shrink:0;margin-left:4px;transition:transform .15s}
.dash-drill-chev.inline{font-size:14px;color:var(--t-4);margin-left:2px}
.dash-seller-row:hover,.dash-loc-card:hover,.dash-fraud-tile:hover{cursor:pointer;border-color:var(--g-bd)}
.dash-seller-row:hover .dash-drill-chev,.dash-loc-card:hover .dash-drill-chev,.dash-fraud-tile:hover .dash-drill-chev{color:var(--g)}

.drill-footer-cta{margin-top:18px;padding-top:14px;border-top:0.5px solid var(--bd)}

/* Fraud dashboard tile */
.dash-fraud-tile{display:flex;align-items:center;gap:12px;padding:13px;background:rgba(220,38,38,0.04);border:0.5px solid rgba(220,38,38,0.22);border-radius:11px;margin-bottom:4px;cursor:pointer;transition:all .15s}
.dash-fraud-tile:hover{background:rgba(220,38,38,0.08);border-color:rgba(220,38,38,0.4)}
.dash-fraud-ic{width:36px;height:36px;border-radius:10px;background:rgba(220,38,38,0.15);color:#ef4444;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dash-fraud-ic svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.dash-fraud-body{flex:1;min-width:0}
.dash-fraud-title{font-size:13px;font-weight:600;color:var(--t)}
.dash-fraud-sub{font-size:11px;color:var(--t-3);margin-top:2px;line-height:1.3}
.dash-fraud-badge{padding:3px 8px;border-radius:6px;background:#ef4444;color:#fff;font-size:11px;font-weight:700;min-width:22px;text-align:center;flex-shrink:0}

/* Dashboard — KPI cards */
.dash-kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.dash-kpi{padding:12px 14px;background:rgba(255,255,255,0.03);border:0.5px solid var(--bd);border-radius:11px}
.dash-kpi-lab{font-size:10px;color:var(--t-3);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:4px}
.dash-kpi-v{font-size:22px;font-weight:700;color:var(--t);letter-spacing:-0.02em;line-height:1.1}
.dash-kpi-delta{font-size:10px;color:var(--t-3);margin-top:4px;font-weight:500}
.dash-kpi-delta.pos{color:var(--ok-t)}
.dash-kpi-delta.neg{color:var(--err-t)}

/* Dashboard — category breakdown */
.dash-cat-breakdown{display:flex;flex-direction:column;gap:10px}
.dash-cat-row{padding:10px 12px;background:rgba(255,255,255,0.03);border:0.5px solid var(--bd);border-radius:10px}
.dash-cat-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dash-cat-emoji{font-size:16px}
.dash-cat-name{flex:1;font-size:13px;font-weight:500;color:var(--t)}
.dash-cat-amount{font-size:14px;font-weight:700;color:var(--g);letter-spacing:-0.01em}
.dash-cat-bar{height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;margin-bottom:4px}
.dash-cat-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.dash-cat-meta{font-size:10px;color:var(--t-3)}

/* Dashboard — top sellers */
.dash-sellers{display:flex;flex-direction:column;gap:5px}
.dash-seller-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,255,255,0.03);border:0.5px solid var(--bd);border-radius:10px}
.dash-seller-row.leader{background:rgba(175,189,119,0.07);border-color:var(--g-bd)}
.dash-seller-rank{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.08);color:var(--t-3);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dash-seller-row.leader .dash-seller-rank{background:var(--g);color:#0d1a05}
.dash-seller-avatar{width:32px;height:32px;border-radius:50%;background:rgba(175,189,119,0.15);color:var(--g);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:11px;flex-shrink:0}
.dash-seller-body{flex:1;min-width:0}
.dash-seller-name{font-size:13px;font-weight:500;color:var(--t)}
.dash-seller-meta{font-size:10px;color:var(--t-3);margin-top:1px}
.dash-seller-amount{font-size:14px;font-weight:700;color:var(--g);letter-spacing:-0.01em;flex-shrink:0}

/* Dashboard — location activity cards */
.dash-loc-card{padding:12px;background:rgba(255,255,255,0.03);border:0.5px solid var(--bd);border-radius:11px;margin-bottom:6px}
.dash-loc-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
.dash-loc-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.dash-loc-body{flex:1;min-width:0}
.dash-loc-name{font-size:13px;font-weight:600;color:var(--t);margin-bottom:5px}
.dash-loc-staff{display:flex;gap:4px;flex-wrap:wrap}
.dash-loc-staff-chip{font-size:10px;padding:2px 7px;border-radius:6px;background:rgba(175,189,119,0.1);color:var(--g);font-weight:500;border:0.5px solid var(--g-bd)}
.dash-loc-total{text-align:right;flex-shrink:0}
.dash-loc-total-v{font-size:20px;font-weight:700;color:var(--t);letter-spacing:-0.02em;line-height:1}
.dash-loc-total-l{font-size:10px;color:var(--t-3);text-transform:uppercase;letter-spacing:.04em;font-weight:600;margin-top:2px}
.dash-loc-breakdown{display:flex;flex-wrap:wrap;gap:10px;padding-top:10px;border-top:0.5px solid var(--bd)}
.dash-loc-stat{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t-2);font-weight:500}
.dash-loc-stat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Chart */
.chart-box{height:80px;background:rgba(255,255,255,0.03);border-radius:10px;padding:8px;margin-bottom:12px}

/* Buttons */
.btn{width:100%;padding:15px;border-radius:14px;background:var(--g);color:#06120F;border:none;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;transition:transform .15s,opacity .15s,background .15s;letter-spacing:.01em;touch-action:manipulation;min-height:44px}
.btn:active{transform:scale(0.97);opacity:.85;background:var(--g-dk);color:var(--t)}
.btn:focus-visible{outline:2px solid var(--g);outline-offset:3px}
.btn-ghost{background:transparent;color:var(--t);border:0.5px solid var(--bd-2)}
.btn-ghost:active{background:rgba(32,153,145,.1)}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:active{background:#b91c1c;opacity:.9}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}

/* Group list */
.group-item{display:flex;align-items:center;gap:12px;padding:12px;background:rgba(255,255,255,0.04);border-radius:10px;margin-bottom:6px}
.group-check{width:24px;height:24px;border-radius:7px;border:1.5px solid var(--bd-2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s}
.group-check.checked{background:var(--g);border-color:var(--g);color:#0d1a05}
.group-check.checked svg{width:14px;height:14px;stroke:#0d1a05;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.group-info{flex:1;min-width:0}
.group-name{font-size:13px;font-weight:500;color:var(--t)}
.group-meta{font-size:11px;color:var(--t-3);margin-top:1px}
.group-status{font-size:10px;font-weight:500;white-space:nowrap}
.group-status.in{color:var(--ok-t)}
.group-status.out{color:var(--t-3)}

/* Summary bar */
.summary{background:var(--g-lt);border:0.5px solid var(--g-bd);border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.summary-txt{font-size:12px;color:var(--g);font-weight:500}
.summary-progress{width:60px;height:4px;background:rgba(0,0,0,0.3);border-radius:2px;overflow:hidden;margin-top:3px}
.summary-progress div{height:100%;background:var(--g);width:50%}

/* Event store / Sell tab */
.sell-attr-prompt{width:100%;display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,0.03);border:0.5px dashed var(--bd-2);border-radius:12px;cursor:pointer;font-family:inherit;transition:all .15s;color:var(--t-2)}
.sell-attr-prompt:hover{border-color:var(--g-bd);background:rgba(175,189,119,0.04);color:var(--t)}
.sell-attr-prompt-ic{width:32px;height:32px;border-radius:9px;background:rgba(175,189,119,0.1);color:var(--g);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sell-attr-prompt-ic svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.sell-attr-prompt-body{flex:1;min-width:0;text-align:left}
.sell-attr-prompt-title{font-size:13px;font-weight:500;color:var(--t);margin-bottom:1px}
.sell-attr-prompt-sub{font-size:11px;color:var(--t-3);line-height:1.3}
.sell-attr-prompt-arr{color:var(--t-3);font-size:18px;flex-shrink:0}

.sell-attribution{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(175,189,119,0.06);border:0.5px solid var(--g-bd);border-radius:12px}
.sell-attr-ic{width:32px;height:32px;border-radius:9px;background:rgba(175,189,119,0.18);color:var(--g);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sell-attr-ic svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.sell-attr-body{flex:1;min-width:0}
.sell-attr-label{font-size:10px;color:var(--g);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:2px}
.sell-attr-name{font-size:14px;font-weight:600;color:var(--t)}
.sell-attr-sub{font-size:11px;color:var(--t-3);margin-top:1px}
.sell-attr-clear{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.08);color:var(--t-2);border:none;font-size:16px;cursor:pointer;font-family:inherit;flex-shrink:0;display:flex;align-items:center;justify-content:center;line-height:1}
.sell-attr-clear:hover{background:rgba(255,255,255,0.15);color:var(--t)}

.sell-cats{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;margin-left:-24px;margin-right:-24px;padding-left:24px;padding-right:24px}
.sell-cats::-webkit-scrollbar{height:0}
.sell-cat{padding:8px 16px;border-radius:999px;background:rgba(255,255,255,0.04);border:0.5px solid var(--bd);color:var(--t-2);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.sell-cat:hover{border-color:var(--g-bd);color:var(--t)}
.sell-cat.active{background:var(--g);color:#0d1a05;border-color:var(--g);font-weight:600}

.sell-items{display:flex;flex-direction:column;gap:8px}
.sell-item{display:flex;gap:12px;padding:12px;background:rgba(255,255,255,0.03);border:0.5px solid var(--bd);border-radius:12px;transition:all .15s}
.sell-item.in-cart{border-color:var(--g);background:rgba(175,189,119,0.05)}
.sell-item-thumb{width:56px;height:56px;border-radius:10px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0}
.sell-item.in-cart .sell-item-thumb{background:rgba(175,189,119,0.12)}
.sell-item-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.sell-item-name{font-size:14px;font-weight:600;color:var(--t);line-height:1.2}
.sell-item-desc{font-size:11px;color:var(--t-3);line-height:1.35}
.sell-item-foot{display:flex;align-items:center;gap:10px;margin-top:4px}

.sell-item-stepper{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,0.05);border:0.5px solid var(--bd);border-radius:8px;padding:2px}
.sell-step-btn{width:26px;height:26px;border-radius:6px;background:transparent;border:none;color:var(--t);font-size:16px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;transition:background .1s}
.sell-step-btn:hover:not(:disabled){background:rgba(255,255,255,0.08)}
.sell-step-btn:disabled{color:var(--t-5);cursor:not-allowed}
.sell-step-val{min-width:24px;text-align:center;font-size:13px;font-weight:600;color:var(--t)}

.sell-item-stock{font-size:11px;color:var(--ok-t);font-weight:500}
.sell-item-stock.low{color:var(--warn-t)}
.sell-item-price{margin-left:auto;font-size:15px;font-weight:700;color:var(--g);letter-spacing:-0.02em}

.sell-cart-bar{position:absolute;bottom:68px;left:0;right:0;background:var(--g);color:#0d1a05;padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(175,189,119,0.25);animation:slide-up .25s ease-out;z-index:5}
@keyframes slide-up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sell-cart-info{flex:1;min-width:0}
.sell-cart-count{font-size:11px;font-weight:600;opacity:0.75;letter-spacing:.02em}
.sell-cart-total{font-size:20px;font-weight:700;letter-spacing:-0.02em;line-height:1.1}
.sell-cart-btn{padding:11px 18px;border-radius:10px;background:#0d1a05;color:#fff;border:none;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:8px;white-space:nowrap}
.sell-cart-btn:hover{opacity:0.92}
.sell-cart-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* Menu items */
.menu-row{display:flex;align-items:center;gap:12px;padding:13px;border-radius:10px;background:rgba(255,255,255,0.04);margin-bottom:5px;cursor:pointer;transition:background .15s;color:inherit;font-family:inherit;border:none;width:100%;text-align:left}
.menu-row:hover{background:rgba(255,255,255,0.07)}
.menu-ic{width:34px;height:34px;border-radius:9px;background:var(--g-lt);color:var(--g);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.menu-ic svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.menu-body{flex:1;min-width:0}
.menu-ttl{font-size:13px;font-weight:500;color:var(--t)}
.menu-sub{font-size:11px;color:var(--t-3);margin-top:1px}
.menu-arr{color:var(--t-4);font-size:18px;flex-shrink:0}

.menu-row.alert{background:rgba(220,38,38,0.08);border:0.5px solid rgba(220,38,38,0.25)}
.menu-row.alert .menu-ic{background:rgba(220,38,38,0.15);color:var(--err-t)}

.profile-card{display:flex;gap:12px;align-items:center;background:var(--g-lt);border:0.5px solid var(--g-bd);border-radius:12px;padding:14px;margin-bottom:16px}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--g);color:#0d1a05;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:15px;flex-shrink:0}
.profile-name{font-size:15px;font-weight:600;color:var(--t)}
.profile-role{font-size:12px;color:var(--t-3);margin-top:2px}

/* ============ BOTTOM NAV ============ */
.nav{background:rgba(10,15,28,0.98);border-top:0.5px solid var(--bd);backdrop-filter:blur(20px);padding:8px 4px 24px;display:flex;justify-content:space-around;flex-shrink:0;position:relative}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:none;background:none;color:var(--t-4);cursor:pointer;font-family:inherit;font-size:10px;position:relative;transition:color .15s}
.nav-item:hover{color:var(--t-2)}
.nav-item.active{color:var(--g)}
.nav-item.active::before{content:"";position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:28px;height:3px;background:var(--g);border-radius:0 0 3px 3px}
.nav-item:disabled{color:var(--t-5);cursor:not-allowed;position:relative}
.nav-item:disabled .nav-ic::after{content:"";position:absolute;top:-3px;right:-3px;width:10px;height:10px;border-radius:50%;background:var(--t-5);border:1.5px solid var(--bg-2)}
.nav-ic{width:26px;height:26px;position:relative}
.nav-ic svg{width:26px;height:26px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
.nav-label{font-weight:500;font-size:10px}
.nav-badge{position:absolute;top:2px;left:50%;margin-left:6px;min-width:18px;height:18px;border-radius:9px;background:#dc2626;color:#fff;font-size:10px;font-weight:700;padding:0 5px;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--bg-2);letter-spacing:-0.02em;animation:badge-pop .25s ease-out;box-shadow:0 2px 6px rgba(220,38,38,0.4)}
.nav-badge.sync{background:#3b82f6;animation:pulse 1.4s infinite;box-shadow:none}
.nav-badge.warn{background:#f59e0b;color:#3d2200;box-shadow:0 2px 6px rgba(245,158,11,0.4)}
@keyframes badge-pop{0%{transform:scale(0)}60%{transform:scale(1.15)}100%{transform:scale(1)}}

/* Nav overlay for lock */
.nav-lock{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(2,6,23,0.95);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;gap:8px;font-size:11px;color:var(--err-t);font-weight:500;padding:0 12px;z-index:10}
.nav-lock svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0}

/* ============ LOGIN OVERLAY ============ */
.login-overlay{position:absolute;inset:0;background:var(--bg);z-index:95;display:none;flex-direction:column;overflow-y:auto}
.login-overlay.shown{display:flex}
/* Center content vertically — fixes the huge gap between fields and button */
.login-overlay > div{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:0;padding:24px 0}
.login-top{padding:0 24px 24px;flex-shrink:0;text-align:center}
.login-logo{width:72px;height:61px;display:flex;align-items:center;justify-content:center;margin:0 auto 22px}
.login-logo svg{width:100%;height:100%;display:block}
.login-wordmark{width:140px;height:auto;display:block;margin:0 auto 20px}
.login-wordmark svg{width:100%;height:auto;display:block}
.login-h{font-size:24px;font-weight:700;color:var(--t);letter-spacing:-0.02em;margin-bottom:6px;line-height:1.2}
.login-s{font-size:13px;color:var(--t-3);line-height:1.5}
.login-body{flex-shrink:0;padding:0 24px;display:flex;flex-direction:column}
.login-body::-webkit-scrollbar{width:0}

.login-device{background:rgba(175,189,119,0.06);border:0.5px solid var(--g-bd);border-radius:11px;padding:10px 14px;margin-bottom:22px;display:flex;align-items:center;gap:10px}
.login-device-ic{width:30px;height:30px;border-radius:8px;background:var(--g-lt);color:var(--g);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.login-device-ic svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.login-device-body{flex:1;min-width:0}
.login-device-ttl{font-size:12px;font-weight:500;color:var(--t)}
.login-device-sub{font-size:11px;color:var(--t-3);margin-top:1px}

.login-field{margin-bottom:18px}
.login-label{display:block;font-size:12px;color:var(--t-2);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.login-input{width:100%;padding:15px 16px;border-radius:12px;background:rgba(255,255,255,0.05);border:1px solid var(--bd-2);color:var(--t);font-size:16px;font-family:inherit;outline:none;transition:all .15s}
.login-input:focus{border-color:var(--g);background:rgba(45,184,156,0.05);box-shadow:0 0 0 3px rgba(45,184,156,0.12)}
.login-input::placeholder{color:rgba(255,255,255,0.25)}
.login-input.error{border-color:var(--err);background:rgba(224,99,99,0.06)}
.login-helper{font-size:11px;color:var(--t-3);margin-top:6px;padding-left:2px}

.login-pw-wrap{position:relative}
.login-pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t-3);cursor:pointer;padding:4px;font-family:inherit}
.login-pw-toggle svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.login-pw-toggle:hover{color:var(--t)}

.login-opts{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.login-remember{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.login-remember-box{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--bd-2);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.login-remember-box.on{background:var(--g);border-color:var(--g)}
.login-remember-box.on svg{width:12px;height:12px;stroke:#0d1a05;stroke-width:3;fill:none}
.login-remember-lbl{font-size:12px;color:var(--t-2)}
.login-forgot{font-size:12px;color:var(--g);cursor:pointer;text-decoration:none;background:none;border:none;font-family:inherit;padding:4px 0}
.login-forgot:hover{opacity:.8}

.login-err{background:rgba(220,38,38,0.08);border:0.5px solid rgba(220,38,38,0.3);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--err-t);display:flex;gap:8px;align-items:flex-start;line-height:1.4}
.login-err svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;flex-shrink:0;margin-top:2px}

.login-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--t-4);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em}
.login-divider::before,.login-divider::after{content:"";flex:1;height:0.5px;background:var(--bd)}

.login-alt{display:flex;gap:8px;margin-bottom:10px}
.login-alt-btn{flex:1;padding:12px;border-radius:11px;background:rgba(255,255,255,0.04);border:0.5px solid var(--bd-2);color:var(--t);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.login-alt-btn:hover{border-color:var(--g-bd);background:rgba(175,189,119,0.04)}
.login-alt-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

.login-foot{padding:20px 24px 8px;flex-shrink:0;background:transparent}
.login-help{text-align:center;font-size:12px;color:var(--t-4);margin-top:12px}
.login-help a{color:var(--g);text-decoration:none;cursor:pointer}
.login-help a:hover{opacity:.8}

.login-spinner{width:18px;height:18px;border-radius:50%;border:2px solid rgba(13,26,5,0.3);border-top-color:#0d1a05;animation:spin 0.8s linear infinite}

.login-biometric{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;border-radius:12px;background:rgba(175,189,119,0.08);border:0.5px solid var(--g-bd);color:var(--g);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;width:100%;margin-bottom:16px;transition:all .15s}
.login-biometric:hover{background:rgba(175,189,119,0.14)}
.login-biometric svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* ============ PAIRING OVERLAY ============ */
.pair-top{padding:20px 24px 10px;flex-shrink:0}
.pair-logo{width:52px;height:44px;display:flex;align-items:center;justify-content:flex-start;margin-bottom:12px}
.pair-logo svg{width:100%;height:100%;display:block}
.pair-wordmark{width:96px;height:auto;display:block;margin-bottom:14px}
.pair-wordmark svg{width:100%;height:auto;display:block}
.pair-h{font-size:22px;font-weight:600;color:var(--t);letter-spacing:-0.02em;margin-bottom:4px;line-height:1.2}
.pair-s{font-size:13px;color:var(--t-3);line-height:1.5}
.pair-body{flex:1;overflow-y:auto;padding:14px 24px 20px;position:relative}
.pair-body::-webkit-scrollbar{width:0}
.pair-foot{padding:14px 24px 22px;border-top:0.5px solid var(--bd);flex-shrink:0;background:var(--bg);box-shadow:0 -8px 16px -8px rgba(2,6,23,0.8);position:relative;z-index:2}

.pair-steps{display:flex;gap:6px;margin-bottom:20px}
.pair-step-dot{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.15);transition:background .3s}
.pair-step-dot.active{background:var(--g)}
.pair-step-dot.done{background:var(--g-dk)}

.pair-method{background:rgba(255,255,255,0.04);border:0.5px solid var(--bd);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .15s;display:flex;gap:14px;align-items:center;font-family:inherit;color:inherit;width:100%;text-align:left}
.pair-method:hover{border-color:var(--g-bd);background:rgba(175,189,119,0.04)}
.pair-method.recommended{border-color:var(--g-bd);background:var(--g-lt)}
.pair-method-ic{width:44px;height:44px;border-radius:11px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--t)}
.pair-method.recommended .pair-method-ic{background:var(--g);color:#0d1a05}
.pair-method-ic svg{width:22px;height:22px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.pair-method-body{flex:1;min-width:0}
.pair-method-ttl{font-size:15px;font-weight:500;color:var(--t);margin-bottom:2px;display:flex;align-items:center;gap:8px}
.pair-method-tag{font-size:9px;padding:2px 7px;border-radius:8px;background:var(--g);color:#0d1a05;font-weight:600;letter-spacing:.04em}
.pair-method-sub{font-size:12px;color:var(--t-3);line-height:1.4}
.pair-method-arr{color:var(--t-4);font-size:20px;flex-shrink:0}

.pair-code-input{display:flex;gap:8px;margin:20px 0;justify-content:center}
