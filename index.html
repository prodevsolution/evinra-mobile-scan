function startGateWristband(ticketCode, guestName) {
  // Check first if already paired
  fetch(DB_URL + '/api/scan/wristband/' + encodeURIComponent(ticketCode))
    .then(r => r.json())
    .then(data => {
      if (data.paired) {
        state.gateWristband = { step: 'already_paired', ticketCode, guestName, wristbandQR: null, errorMsg: null };
      } else {
        state.gateWristband = { step: 'scanning', ticketCode, guestName, wristbandQR: null, errorMsg: null };
      }
      render();
    })
    .catch(() => {
      // Offline or unreachable — go straight to scanning
      state.gateWristband = { step: 'scanning', ticketCode, guestName, wristbandQR: null, errorMsg: null };
      render();
    });
}

function gateWristbandScan(qrCode) {
  state.gateWristband.step = 'saving';
  state.gateWristband.wristbandQR = qrCode;
  render();

  const user = state.currentUser;
  fetch(DB_URL + '/api/scan/wristband', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      ticket_code:   state.gateWristband.ticketCode,
      wristband_qr:  qrCode,
      paired_by:     user ? user.id : null,
      guest_name:    state.gateWristband.guestName,
    }),
  })
    .then(r => r.json().then(data => ({ ok: r.ok, data })))
    .then(({ ok, data }) => {
      if (!ok) {
        if (data.error === 'already_paired') {
          state.gateWristband.step = 'already_paired';
        } else {
          state.gateWristband.step = 'error';
          state.gateWristband.errorMsg = data.message || 'Pairing failed';
        }
      } else {
        state.gateWristband.step = 'done';
        // Auto-reset after 2.5 s so the scanner is ready for the next guest
        setTimeout(() => { cancelGateWristband(); }, 2500);
      }
      render();
    })
    .catch(() => {
      state.gateWristband.step = 'error';
      state.gateWristband.errorMsg = 'No connection — check your network';
      render();
    });
}

// Simulate gate wristband error without hitting the DB
function gateSimulateError(errorType) {
  state.gateWristband.step = 'error';
  state.gateWristband.errorType = errorType;
  state.gateWristband.errorMsg = errorType === 'nfc_write_error'
    ? 'Wristband could not be written. Try a different band.'
    : 'Pairing failed. Try again.';
  render();
}

// Simulate wristband station error without hitting the DB
function wbStationSimulateError(errorType) {
  state.wbStation.step = 'error';
  state.wbStation.errorType = errorType;
  render();
}

function cancelGateWristband() {
  state.gateWristband = { step: null, ticketCode: null, guestName: null, wristbandQR: null, errorMsg: null };
  setScan('idle');
}

/* ========== EVENT PICKER (post-login) ========== */

// Strip the generator's "· YYYY-MM" suffix to get a clean event/show name.
function epClean(n) { return String(n || '').replace(/\s*·\s*\d{4}-\d{2}\s*$/, '').trim(); }
// Parse an event's start_at into { date (with day), time, ts }.
function epWhen(start) {
  if (!start) return { date: 'Date TBD', time: '', ts: null };
  const d = new Date(String(start).replace(' ', 'T'));
  if (isNaN(d)) return { date: 'Date TBD', time: '', ts: null };
  return {
    date: d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }),
    time: d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }),
    ts:   d.getTime(),
  };
}

function renderEventPicker() {
  const overlay = document.getElementById('event-picker-overlay');
  const shown   = state.signedIn && state.pendingEventSelection;
  overlay.classList.toggle('shown', shown);
  if (!shown) return;

  const content = document.getElementById('event-picker-content');
  const selectedId = state.eventPickerSelected; // event id (string) or null

  // Build cards from real events, then keep only CURRENT/FUTURE ones (an operator
  // works today's or upcoming shows — never past dates, and not undated parents).
  const now = Date.now();
  const startOfToday = new Date(); startOfToday.setHours(0, 0, 0, 0);
  const startTs = startOfToday.getTime();
  const endOfToday = startTs + 86400000;

  let evs = (state.dbEvents || []).map(e => {
    const w = epWhen(e.start_at);
    return { id: String(e.id || e._id), name: epClean(e.name) || 'Event', date: w.date, time: w.time, ts: w.ts, desc: e.description, venue: e.venue || '' };
  });
  const dated = evs.filter(e => e.ts != null && e.ts >= startTs);   // today or later
  // Prefer current/future dated shows; only fall back to undated events if there are none.
  evs = (dated.length ? dated : evs.filter(e => e.ts == null)).sort((a, b) => (a.ts || Infinity) - (b.ts || Infinity));

  // Badge: "TODAY" only if it's genuinely today; otherwise mark the soonest as "NEXT".
  const todayId = (evs.find(e => e.ts != null && e.ts >= startTs && e.ts < endOfToday) || {}).id;
  const nextId  = todayId ? null : (evs.find(e => e.ts != null && e.ts >= now) || evs[0] || {}).id;

  const emptyMsg =
      state.eventLoadState === 'no-tenant'
        ? `<div style="color:var(--t-3);font-size:13px;text-align:center;padding:40px 16px;line-height:1.6">Your account isn't linked to a company.<br>Ask your administrator to assign you to one in the Ticket System.</div>`
    : state.eventLoadState === 'error'
        ? `<div style="color:var(--t-3);font-size:13px;text-align:center;padding:40px 16px">Couldn't load events. Check your connection and try again.</div>`
    : state.eventLoadState === 'loaded'
        ? `<div style="color:var(--t-3);font-size:13px;text-align:center;padding:40px 16px">No published events for your company yet.</div>`
        : `<div style="color:var(--t-3);font-size:13px;text-align:center;padding:40px 0">Loading events…</div>`;

  const cardHTML = evs.length === 0
    ? emptyMsg
    : evs.map(e => {
        const sel = selectedId === e.id;
        const isToday = e.id === todayId;
        const isNext = e.id === nextId;
        const badgeText = isToday ? 'TODAY' : (isNext ? 'NEXT' : '');
        const meta = [[e.date, e.time].filter(Boolean).join(' · '), e.venue].filter(Boolean).join('  ·  ');
        return `
          <button onclick="selectEventCard('${e.id}')"
            style="width:100%;text-align:left;background:${sel ? 'rgba(45,184,156,.10)' : 'rgba(255,255,255,.03)'};
                   border:0.5px solid ${sel ? 'var(--p-border)' : 'var(--bd)'};
                   border-radius:14px;padding:14px 16px;margin-bottom:10px;
                   cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:12px">
            <div style="width:9px;height:9px;border-radius:50%;flex-shrink:0;
                        background:${(isToday || isNext) ? 'var(--p)' : 'var(--t-4)'}"></div>
            <div style="flex:1;min-width:0">
              <div style="font-size:15px;font-weight:600;color:var(--t);margin-bottom:3px">${e.name}</div>
              <div style="font-size:12px;color:var(--t-3)">${meta}${e.desc ? ' · ' + e.desc : ''}</div>
            </div>
            ${badgeText ? `<span style="font-size:10px;font-weight:700;letter-spacing:.06em;color:var(--p);background:var(--p-dim);border:0.5px solid var(--p-border);padding:3px 8px;border-radius:6px;flex-shrink:0">${badgeText}</span>` : ''}
            ${sel ? `<span style="color:var(--p);font-size:18px;flex-shrink:0">✓</span>` : ''}
          </button>`;
      }).join('');

  content.innerHTML = `
    <div class="login-top" style="padding-bottom:0">
      <div class="login-wordmark">${LOGO_FULL}</div>
    </div>
    <div class="login-body" style="padding-top:16px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
        <button onclick="skipEventAndLogout()" style="background:none;border:none;color:var(--t-3);font-size:13px;cursor:pointer;font-family:inherit;padding:0;display:flex;align-items:center;gap:4px">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg> Back
        </button>
        <div style="font-size:18px;font-weight:700;color:var(--t);font-family:var(--sans)">Your Events</div>
      </div>
      <div style="font-size:13px;color:var(--t-3);margin-bottom:20px">Select the event you're working, then Start Shift</div>
      ${cardHTML}
    </div>
    <div class="login-foot">
      <button class="btn" style="background:${selectedId ? 'var(--p)' : 'rgba(255,255,255,.12)'};color:${selectedId ? 'var(--p-contrast,#06120F)' : 'var(--t-3)'};cursor:${selectedId ? 'pointer' : 'default'}"
        onclick="${selectedId ? 'startShift()' : ''}">Start Shift</button>
    </div>
  `;
}

function selectEventCard(eventId) {
  // Tap to select (highlights the card + enables Start Shift); confirm with startShift().
  state.eventPickerSelected = (state.eventPickerSelected === eventId) ? null : eventId;
  renderEventPicker();
}

function startShift() {
  const id = state.eventPickerSelected;
  if (!id) return;
  const e = (state.dbEvents || []).find(x => String(x.id || x._id) === String(id));
  if (!e) return;
  const w = epWhen(e.start_at);
  state.session.production = { id, name: epClean(e.name) || 'Event' };
  state.session.event = { id, time: w.time || '', date: w.date || '' };
  state.pendingEventSelection = false;
  state.eventPickerSelected = null;
  saveScanSession();
  render();
}

function skipEventAndLogout() {
  // H-03: confirm before signing out from event picker
  if (confirm('Go back to sign in? Your session will end.')) signOut();
}

/* ========== LOCATION & SHOW PICKERS ========== */

function openLocationPicker() {
  state.locationPickerOpen = true;
  if (!state.dbLocations.length) {
    render(); // show loading state immediately
    fetch(DB_URL + '/api/db/locations?order=name.asc')
      .then(r => r.json())
      .then(list => { state.dbLocations = list; render(); })
      .catch(() => render());
  } else {
    render();
  }
}

function closeLocationPicker() {
  state.locationPickerOpen = false;
  render();
}

function selectLocation(id, name) {
  state.session.location = { id, name };
  state.locationPickerOpen = false;
  render();
}

function openShowPicker() {
  state.showPickerStep = 'production';
  state.showPickerOpen = true;
  render();
  if (!state.dbEvents.length) {
    // Scope to the operator's company (event → show → production → tenant).
    loadTenantEvents(state.currentUser && state.currentUser.tenantId);
  }
}

function closeShowPicker() {
  state.showPickerOpen = false;
  render();
}

function selectProduction(id, name) {
  state.session.production = { id, name };
  state.session.event = null;
  state.showPickerStep = 'event';

  // Build time slots from the events table: one event = one time slot for MVP
  // (In full version each production would have multiple showtimes)
  const prod = state.dbEvents.find(e => e.id === id);
  if (prod && prod.start_at) {
    const d = new Date(prod.start_at);
    const time = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const date = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    state.dbEventTimes = [{ id: prod.id, time, date }];
  } else {
    // Fallback mock times for demo
    state.dbEventTimes = [
      { id: id * 10 + 1, time: '6:00 PM',  date: 'Today' },
      { id: id * 10 + 2, time: '8:00 PM',  date: 'Today' },
      { id: id * 10 + 3, time: '10:00 PM', date: 'Today' },
    ];
  }
  render();
}

function selectEventTime(id, time) {
  state.session.event = { id, time };
  state.showPickerOpen = false;
  render();
}

/* ========== INIT ========== */

restoreScanSession();   // resume an existing operator session (tenant-scoped) if present
render();
startDashTicker();
ensureDashInitialized();
</script>
